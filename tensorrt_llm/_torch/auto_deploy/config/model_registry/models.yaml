version: '1.0'
description: >
  AutoDeploy serve registry. Maps model names to their AD-specific internal
  default configs (ad_defaults). These are auto-injected by trtllm-serve when
  --backend _autodeploy is used. Users supply common knobs via --config.
models:
# --- DeepSeek R1 family ---
- name: deepseek-ai/DeepSeek-R1
  config_id: default
  ad_defaults: ['ad_base.yaml', 'deepseek_r1_ad.yaml']
- name: deepseek-ai/DeepSeek-R1-0528
  config_id: default
  ad_defaults: ['ad_base.yaml', 'deepseek_r1_ad.yaml']
- name: nvidia/DeepSeek-R1-FP4
  config_id: default
  ad_defaults: ['ad_base.yaml', 'deepseek_r1_ad.yaml']
- name: nvidia/DeepSeek-R1-FP4-v2
  config_id: default
  ad_defaults: ['ad_base.yaml', 'deepseek_r1_ad.yaml']
# --- Llama 3.3 70B ---
- name: meta-llama/Llama-3.3-70B-Instruct
  config_id: default
  ad_defaults: ['ad_base.yaml', 'llama3_3_70b_ad.yaml']
- name: nvidia/Llama-3.3-70B-Instruct-FP8
  config_id: default
  ad_defaults: ['ad_base.yaml', 'llama3_3_70b_ad.yaml']
# --- Llama 4 Scout ---
- name: meta-llama/Llama-4-Scout-17B-16E-Instruct
  config_id: default
  ad_defaults: ['ad_base.yaml', 'llama4_scout_ad.yaml']
- name: nvidia/Llama-4-Scout-17B-16E-Instruct-FP8
  config_id: default
  ad_defaults: ['ad_base.yaml', 'llama4_scout_ad.yaml']
# --- Nemotron-3-Super v3 ---
- name: nvidia/NVIDIA-Nemotron-3-Super-120B-BF16-BF16KV-010726
  config_id: default
  ad_defaults: ['ad_base.yaml', 'super_v3_ad.yaml']
# --- Generic defaults (no model-specific AD overrides) ---
- name: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  config_id: default
  ad_defaults: ['ad_base.yaml']
- name: meta-llama/Llama-3.1-8B-Instruct
  config_id: default
  ad_defaults: ['ad_base.yaml']
- name: nvidia/Llama-3.1-8B-Instruct-FP8
  config_id: default
  ad_defaults: ['ad_base.yaml']
