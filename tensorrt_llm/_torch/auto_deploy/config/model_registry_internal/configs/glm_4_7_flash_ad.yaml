# AD-specific defaults for GLM-4.7-Flash.
compile_backend: torch-cudagraph
transforms:
  match_swiglu_pattern:
    enabled: true
  match_nvfp4_swiglu_pattern:
    enabled: true
  fuse_nvfp4_moe:
    allow_different_input_scales: true
  fuse_nvfp4_swiglu:
    enabled: true
  fuse_swiglu:
    enabled: true
  multi_stream_moe:
    stage: compile
    enabled: true
  multi_stream_mla_attn:
    stage: compile
    enabled: true
