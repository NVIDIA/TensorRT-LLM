# Base AutoDeploy defaults for trtllm-serve.
# Applied to all models when serving with --backend _autodeploy.
# Model-specific configs are deep-merged on top with higher priority.
runtime: trtllm
attn_backend: trtllm
compile_backend: torch-cudagraph
model_factory: AutoModelForCausalLM
skip_loading_weights: false
transforms:
  fuse_trtllm_attn_quant_fp8:
    enabled: true
  fuse_rmsnorm_quant_fp8:
    stage: post_load_fusion
    enabled: true
