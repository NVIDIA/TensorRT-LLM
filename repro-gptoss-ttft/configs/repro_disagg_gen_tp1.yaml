# Disagg generation worker (1 GPU) for gpt-oss-120b TP1, Eagle3-next.
# Exact match to:
#   simengl/trtllm-cookbook: projects/aarwlt-gptoss/agg-vs-disagg-lifetime-20260512/
#                            configs/disagg_tp1_gen_lifetime_20260512.yaml
# (which is a copy of rwlt-results/configs/gpt-oss-120b/trtllm/decode/tp1_eagle3_next_gen512_mbs128.yaml)
#
# Used by: scripts/launch_disagg.sh (gen role on port 8002)
backend: pytorch
tensor_parallel_size: 1
pipeline_parallel_size: 1
moe_expert_parallel_size: 1
max_batch_size: 128
max_num_tokens: 512
max_seq_len: 131072
stream_interval: 100
trust_remote_code: true
enable_chunked_prefill: true
enable_attention_dp: false
num_postprocess_workers: 0
sampler_type: auto
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
kv_cache_config:
  event_buffer_max_size: 16384
  dtype: fp8
  free_gpu_memory_fraction: 0.9
  enable_block_reuse: true
torch_compile_config:
  enable_fullgraph: true
  enable_piecewise_cuda_graph: true
  enable_userbuffers: false
  capture_num_tokens:
  - 4
  - 8
  - 12
  - 16
