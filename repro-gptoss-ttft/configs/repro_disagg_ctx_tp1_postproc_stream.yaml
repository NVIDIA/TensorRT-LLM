# Ablation: disagg ctx with num_postprocess_workers=4 + stream_interval=20, Eagle3-v3 spec KEPT ON.
# Derived from configs/repro_disagg_ctx_tp1.yaml.
# Disagg context worker (1 GPU) for gpt-oss-120b TP1, Eagle3-next.
# Exact match to:
#   simengl/trtllm-cookbook: projects/aarwlt-gptoss/agg-vs-disagg-lifetime-20260512/
#                            configs/disagg_tp1_ctx_lifetime_20260512.yaml
# (which is a copy of rwlt-results/configs/gpt-oss-120b/trtllm/prefill/tp1_ctx_20260510.yaml)
#
# Used by: scripts/launch_disagg.sh (ctx role on port 8001)
backend: pytorch
tensor_parallel_size: 1
pipeline_parallel_size: 1
moe_expert_parallel_size: 1
max_batch_size: 128
max_num_tokens: 20000
max_seq_len: 131072
stream_interval: 20
trust_remote_code: true
disable_overlap_scheduler: false
enable_chunked_prefill: true
enable_attention_dp: false
num_postprocess_workers: 4
sampler_type: auto
scheduler_config:
  capacity_scheduler_policy: MAX_UTILIZATION
  context_chunking_policy: FIRST_COME_FIRST_SERVED
kv_cache_config:
  event_buffer_max_size: 16384
  dtype: fp8
  free_gpu_memory_fraction: 0.9
  enable_block_reuse: true
torch_compile_config:
  enable_fullgraph: true
  enable_piecewise_cuda_graph: true
  enable_userbuffers: false
