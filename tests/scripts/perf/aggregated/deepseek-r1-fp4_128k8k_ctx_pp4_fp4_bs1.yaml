metadata:
  model_name: deepseek_r1_0528_fp4_v2
  precision: fp4
  model_dir_name: DeepSeek-R1-0528-FP4-v2
  supported_gpus:
  - GB300
  benchmark_type: 128k8k
slurm:
  partition: <partition>
  account: <account>
  job_time: 01:00:00
  job_name: agg-ctx-only
  extra_args: --gres=gpu:4
  numa_bind: true
hardware:
  gpus_per_node: 4
environment:
  container_mount: <container_mount>
  container_image: <container_image>
  model_path: <model_path>
  trtllm_repo: ''
  build_wheel: false
  work_dir: <full_path_to_work_dir>
  worker_env_var: TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1
    TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes MIMALLOC_PURGE_DELAY=0
  server_env_var: TRTLLM_SERVER_DISABLE_GC=1
profiling:
  nsys_on: false
accuracy:
  enable_accuracy_test: false
server_configs:
- name: deepseek-r1-fp4_128k8k_ctx_pp4_fp4_bs1
  tensor_parallel_size: 1
  pipeline_parallel_size: 4
  context_parallel_size: 1
  moe_expert_parallel_size: 1
  enable_attention_dp: false
  max_batch_size: 1
  max_num_tokens: 131104
  max_seq_len: 131104
  kv_cache_config:
    enable_block_reuse: false
    free_gpu_memory_fraction: 0.4
    dtype: fp8
  print_iter_log: true
  disable_overlap_scheduler: true
  moe_config:
    backend: TRTLLM
client_configs:
- name: deepseek-r1-fp4_128k8k_ctx_pp4_fp4_bs1_client
  concurrency_list: '1'
  input_length: 131072
  output_length: 8192
  dataset_file: <dataset_file>
