metadata:
  model_name: deepseek_v32_fp4
  precision: fp4
  model_dir_name: DeepSeek-V3.2-FP4
  supported_gpus:
  - GB200
  - GB300
  benchmark_type: 32k4k
slurm:
  partition: <partition>
  account: <account>
  job_time: 01:00:00
  job_name: agg-ctx-only
  extra_args: --gres=gpu:4
  numa_bind: true
hardware:
  gpus_per_node: 4
environment:
  container_mount: <container_mount>
  container_image: <container_image>
  model_path: <model_path>
  trtllm_repo: ''
  build_wheel: false
  work_dir: <full_path_to_work_dir>
  worker_env_var: TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1 TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes
  server_env_var: TRTLLM_SERVER_DISABLE_GC=1
profiling:
  nsys_on: false
accuracy:
  enable_accuracy_test: false
server_configs:
- name: deepseek-v32-fp4_32k4k_ctx_dep8_fp4_attndp_bs32
  tensor_parallel_size: 8
  pipeline_parallel_size: 1
  context_parallel_size: 1
  moe_expert_parallel_size: 8
  enable_attention_dp: true
  max_batch_size: 32
  max_num_tokens: 8192
  max_seq_len: 121000
  kv_cache_config:
    enable_block_reuse: false
    free_gpu_memory_fraction: 0.6
    dtype: fp8
  print_iter_log: true
  disable_overlap_scheduler: true
  moe_config:
    backend: TRTLLM
client_configs:
- name: deepseek-v32-fp4_32k4k_ctx_dep8_fp4_attndp_bs32_client
  concurrency_list: '1'
  input_length: 32768
  output_length: 4096
  dataset_file: <dataset_file>
