metadata:
  model_name: deepseek_v4_pro_fp4
  precision: fp4
  model_dir_name: DeepSeek-V4-Pro
  supported_gpus:
  - GB300
  script_file: disaggr_torch.slurm
  benchmark_type: 8k1k
slurm:
  script_file: disaggr_torch.slurm
  partition: <partition>
  account: <account>
  job_time: 02:00:00
  job_name: unified-benchmark
  extra_args: --gres=gpu:4
  numa_bind: true
benchmark:
  mode: e2e
  use_nv_sa_benchmark: false
  multi_round: 10
  benchmark_ratio: 0.0
  streaming: true
  concurrency_list: '2'
  input_length: 7456
  output_length: 923
  # Random synthetic dataset (no captured dataset file yet for DSv4-Pro); the
  # placeholder falls through to test_perf_sanity.py's random-dataset path.
  dataset_file: <dataset_file>
hardware:
  gpus_per_node: 4
  num_ctx_servers: 1
  num_gen_servers: 5
environment:
  container_mount: <container_mount>
  container_image: <container_image>
  model_path: <model_path>
  trtllm_repo: ''
  build_wheel: false
  work_dir: <full_path_to_work_dir>
  worker_env_var: TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1 TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes NCCL_GRAPH_MIXING_SUPPORT=0 MIMALLOC_PURGE_DELAY=0 "PYTHONWARNINGS=ignore::DeprecationWarning:cutlass.cute.core" TLLM_SPEC_DECODE_FORCE_NUM_ACCEPTED_TOKENS=3
  ctx_worker_env_var: PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
  server_env_var: TRTLLM_SERVER_DISABLE_GC=1
profiling:
  nsys_on: false
worker_config:
  gen:
    print_iter_log: true
    max_batch_size: 1
    max_num_tokens: 4
    max_seq_len: 9256
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    pipeline_parallel_size: 1
    context_parallel_size: 1
    enable_attention_dp: false
    enable_lm_head_tp_in_adp: false
    cuda_graph_config:
      enable_padding: true
      batch_sizes: [1, 2, 4]
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.9
      dtype: fp8
      tokens_per_block: 128
    moe_config:
      backend: TRTLLM
      use_low_precision_moe_combine: true
    cache_transceiver_config:
      max_tokens_in_buffer: 8192
      kv_transfer_timeout_ms: 600000
      backend: NIXL
      transceiver_runtime: PYTHON
    disable_overlap_scheduler: false
    speculative_config: &id001
      decoding_type: MTP
      max_draft_len: 3
    num_postprocess_workers: 4
    stream_interval: 100
  ctx:
    print_iter_log: true
    max_batch_size: 2
    max_num_tokens: 8192
    max_seq_len: 8232
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    pipeline_parallel_size: 1
    context_parallel_size: 1
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: false
    cuda_graph_config: null
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.5
      dtype: fp8
      tokens_per_block: 128
    moe_config:
      backend: TRTLLM
    cache_transceiver_config:
      max_tokens_in_buffer: 8192
      kv_transfer_timeout_ms: 600000
      backend: NIXL
      transceiver_runtime: PYTHON
    disable_overlap_scheduler: true
    speculative_config: *id001
