slurm:
  script_file: ""
  partition: ""
  account: ""
  job_time: "02:00:00"
  job_name: ""
  numa_bind: true

benchmark:
  mode: "e2e"
  multi_round: 8
  benchmark_ratio: 0.8
  streaming: true
  concurrency_list: "1075"
  input_length: 1024
  output_length: 1024
  dataset_file: ""

hardware:
  gpus_per_node: 4
  num_ctx_servers: 1
  num_gen_servers: 1
  gpus_per_ctx_server: 4
  gpus_per_gen_server: 4

environment:
  container_mount: ""
  container_image: ""
  container_workdir: ""
  job_workspace: ""
  model_path: ""
  model_name: "deepseek_r1_0528_fp4_v2"
  llm_models_root: ""
  trtllm_repo: ""
  build_wheel: false
  trtllm_wheel_path: ""
  worker_env_var: "TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1 TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes"
  server_env_var: "TRTLLM_SERVER_DISABLE_GC=1"

worker_config:
  gen:
    tensor_parallel_size: 32
    moe_expert_parallel_size: 32
    enable_attention_dp: true
    pipeline_parallel_size: 1
    max_batch_size: 32
    max_num_tokens: 32
    max_seq_len: 2251
    cuda_graph_config:
      enable_padding: true
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
      - 512
      - 768
      - 1024
      - 2048
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.9
      dtype: fp8
    moe_config:
      backend: WIDEEP
    cache_transceiver_config:
      max_tokens_in_buffer: 4608
      backend: NIXL
    stream_interval: 20
    num_postprocess_workers: 4
  ctx:
    max_batch_size: 4
    max_num_tokens: 4608
    max_seq_len: 2251
    tensor_parallel_size: 4
    moe_expert_parallel_size: 4
    enable_attention_dp: true
    pipeline_parallel_size: 1
    print_iter_log: true
    cuda_graph_config: null
    disable_overlap_scheduler: true
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.85
      dtype: fp8
    cache_transceiver_config:
      max_tokens_in_buffer: 4608
      backend: NIXL
