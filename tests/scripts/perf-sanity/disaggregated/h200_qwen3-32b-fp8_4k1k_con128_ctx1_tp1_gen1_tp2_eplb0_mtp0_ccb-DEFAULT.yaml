metadata:
  model_name: qwen3_32b_fp8
  precision: fp8
  model_dir_name: Qwen3-32B-FP8
  supported_gpus:
  - H200
  script_file: disaggr_torch.slurm
  benchmark_type: 4k1k
  # Native-target (Hopper) mirror of the Dynamo Qwen3-32B-FP8 TRT-LLM disagg
  # deployment recipe:
  # https://github.com/ai-dynamo/dynamo/tree/main/recipes/qwen3-32b-fp8/trtllm/disagg
slurm:
  script_file: disaggr_torch.slurm
  partition: <partition>
  account: <account>
  job_time: 02:00:00
  job_name: unified-benchmark
  extra_args: "--gres=gpu:8"
  numa_bind: true
benchmark:
  mode: e2e
  use_nv_sa_benchmark: false
  multi_round: 10
  benchmark_ratio: 0.0
  streaming: true
  concurrency_list: '128'
  input_length: 4096
  output_length: 1024
  dataset_file: datasets/perf-ci/qwen3_32b-4k1k-20480-ratio-1_for_serve.json
hardware:
  gpus_per_node: 8
  num_ctx_servers: 1
  num_gen_servers: 1
environment:
  container_mount: <container_mount>
  container_image: <container_image>
  model_path: <model_path>
  trtllm_repo: ''
  build_wheel: false
  work_dir: <full_path_to_work_dir>
  worker_env_var: "TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1 TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes TRT_LLM_DISABLE_LOAD_WEIGHTS_IN_PARALLEL=True"
  server_env_var: "TRTLLM_SERVER_DISABLE_GC=1"
profiling:
  nsys_on: false
accuracy:
  enable_accuracy_test: false
worker_config:
  gen:
    print_iter_log: true
    tensor_parallel_size: 2
    pipeline_parallel_size: 1
    context_parallel_size: 1
    enable_attention_dp: false
    enable_chunked_prefill: false
    trust_remote_code: true
    max_batch_size: 128
    max_num_tokens: 7808
    max_seq_len: 7808
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 128
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.9
      dtype: fp8
    cache_transceiver_config:
      backend: DEFAULT
    disable_overlap_scheduler: false
  ctx:
    print_iter_log: true
    tensor_parallel_size: 1
    pipeline_parallel_size: 1
    context_parallel_size: 1
    enable_attention_dp: false
    enable_chunked_prefill: false
    trust_remote_code: true
    max_batch_size: 1
    max_num_tokens: 7808
    max_seq_len: 7808
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 256
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.9
      dtype: fp8
    cache_transceiver_config:
      backend: DEFAULT
    disable_overlap_scheduler: true
