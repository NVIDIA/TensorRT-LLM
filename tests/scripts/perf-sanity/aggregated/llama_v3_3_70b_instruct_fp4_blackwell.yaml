metadata:
  model_name: llama_v3.3_70b_instruct_fp4
  supported_gpus:
  - B200
hardware:
  gpus_per_node: 8
server_configs:
  # TP4, ISL/OSL: 512/32
  - name: "llama70b_fp4_tp4_512_32"
    model_name: "llama_v3.3_70b_instruct_fp4"
    tensor_parallel_size: 4
    pipeline_parallel_size: 1
    max_batch_size: 512
    max_num_tokens: 2048
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 512
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.9
    client_configs:
      - name: "con512_iter10_512_32"
        concurrency: 512
        iterations: 10
        isl: 512
        osl: 32
        backend: "openai"

  # TP4, ISL/OSL: 1000/1000
  - name: "llama70b_fp4_tp4_1000_1000"
    model_name: "llama_v3.3_70b_instruct_fp4"
    tensor_parallel_size: 4
    pipeline_parallel_size: 1
    max_batch_size: 1024
    max_num_tokens: 4096
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 1024
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.85
    client_configs:
      - name: "con512_iter10_1000_1000"
        concurrency: 512
        iterations: 10
        isl: 1000
        osl: 1000
        backend: "openai"
