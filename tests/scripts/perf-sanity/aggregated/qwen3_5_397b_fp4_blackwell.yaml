metadata:
  model_name: qwen3.5_397b_a17b_fp4
  supported_gpus:
  - B200
hardware:
  gpus_per_node: 8
server_configs:
  # 1k1k - TEP8 with TRTLLM, no MTP
  - name: "qwen3_5_397b_fp4_tep8_1k1k"
    model_name: "qwen3.5_397b_a17b_fp4"
    tensor_parallel_size: 8
    moe_expert_parallel_size: 8
    max_batch_size: 512
    max_num_tokens: 16384
    trust_remote_code: true
    num_postprocess_workers: 4
    print_iter_log: true
    enable_layerwise_nvtx_marker: false
    disable_overlap_scheduler: false
    enable_iter_perf_stats: true
    enable_chunked_prefill: false
    stream_interval: 20
    scheduler_config:
      capacity_scheduler_policy: MAX_UTILIZATION
      context_chunking_policy: FIRST_COME_FIRST_SERVED
    kv_cache_config:
      free_gpu_memory_fraction: 0.9
      enable_block_reuse: false
      dtype: 'fp8'
    cuda_graph_config:
      enable_padding: true
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
      - 384
      - 512
    moe_config:
      backend: 'TRTLLM'
      use_low_precision_moe_combine: true
    batch_wait_timeout_iters: 50
    batch_wait_max_tokens_ratio: 0.0625
    client_configs:
      - name: "con4_iter5_1k1k"
        concurrency: 4
        iterations: 5
        isl: 1024
        osl: 1024
        backend: "openai"
        trust_remote_code: true
        dataset_file: <dataset_file>

  # 1k1k - DEP4 with CUTEDSL, no MTP
