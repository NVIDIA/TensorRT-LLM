# Hardware Config
hardware:
  gpus_per_node: 4
  num_ctx_servers: 1
  gpus_per_ctx_server: 4
  num_gen_servers: 1
  gpus_per_gen_server: 4
numa_bind: true
timeout: 7200
# Disagg Configs
disagg_configs:
  - name: "r1_fp4_v2_dep8_mtp1"
    model_name: "deepseek_r1_0528_fp4_v2"
    # Benchmark Config
    benchmark:
      iterations: 8
      random_range_ratio: 0.8
      streaming: true
      concurrency: 16
      isl: 1024
      osl: 1024
    # Gen and Ctx Config
    gen:
      tensor_parallel_size: 4
      moe_expert_parallel_size: 4
      enable_attention_dp: true
      enable_lm_head_tp_in_adp: true
      pipeline_parallel_size: 1
      max_batch_size: 256
      max_num_tokens: 512
      max_seq_len: 4608
      cuda_graph_config:
        enable_padding: true
        max_batch_size: 256
      print_iter_log: true
      kv_cache_config:
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.8
        dtype: fp8
      moe_config:
        backend: CUTLASS
      cache_transceiver_config:
        max_tokens_in_buffer: 4608
        backend: DEFAULT
      stream_interval: 20
      num_postprocess_workers: 4
      speculative_config:
        decoding_type: MTP
        num_nextn_predict_layers: 1
    ctx:
      max_batch_size: 4
      max_num_tokens: 4608
      max_seq_len: 4608
      tensor_parallel_size: 4
      moe_expert_parallel_size: 4
      enable_attention_dp: true
      pipeline_parallel_size: 1
      print_iter_log: true
      cuda_graph_config: null
      disable_overlap_scheduler: true
      kv_cache_config:
        enable_block_reuse: false
        free_gpu_memory_fraction: 0.85
        dtype: fp8
      cache_transceiver_config:
        max_tokens_in_buffer: 4608
        backend: DEFAULT
      speculative_config:
        decoding_type: MTP
        num_nextn_predict_layers: 1
