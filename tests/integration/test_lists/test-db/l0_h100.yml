  - unittest/_torch/multimodal -k "not nemotron_nano_v2_vl_fp8"
  # test_speculative_d2h_parity_real_predictor (both no_stop_token and
  # stop_token_15) is a HW-agnostic sampler D2H-parity invariant (plain CUDA
  # stream/event, no SM gating), covered on A30 pre-merge; drop that whole
  # function's leaves on Hopper, keep the rest of the sampler dir.
  - unittest/_torch/sampler -k "not test_speculative_d2h_parity_real_predictor"
