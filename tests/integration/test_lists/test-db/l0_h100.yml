  - unittest/_torch/modeling -k "modeling_llama"
  - unittest/_torch/modeling -k "modeling_mixtral"
  - unittest/_torch/modeling -k "modeling_gemma3"
  - unittest/_torch/modeling -k "modeling_gpt_oss"
