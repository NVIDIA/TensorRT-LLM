version: 0.0.1
l0_verl:
- condition:
    ranges:
      system_gpu_count:
        gte: 4
        lte: 4
    wildcards:
      gpu:
      - '*b200*'
      linux_distribution_name: ubuntu*
      cpu: x86_64
    terms:
      stage: post_merge
      backend: verl
      orchestrator: mpi
  tests:
  - verl/test_verl_cases.py::test_async_server
  - verl/test_verl_cases.py::test_adapter
  - verl/test_verl_cases.py::test_rollout_utils
