version: 0.0.1
perf_sanity_l0_gb200:
- condition:
    ranges:
      system_gpu_count:
        gte: 4
        lte: 4
    wildcards:
      gpu:
      - '*gb200*'
    terms:
      stage: post_merge
      backend: pytorch
      orchestrator: mpi
  tests:
  - perf/test_perf.py::test_perf[perf_sanity_upload-l0_gb200-r1_fp4_v2_dep4_mtp1_1k1k,r1_fp4_v2_dep4_mtp1_8k1k,r1_fp4_v2_dep4_mtp1_1k8k] TIMEOUT (180)
  - perf/test_perf.py::test_perf[perf_sanity_upload-l0_gb200-r1_fp4_v2_tep4_mtp3_1k1k,r1_fp4_v2_tep4_mtp3_8k1k,r1_fp4_v2_tep4_mtp3_1k8k] TIMEOUT (180)
  - perf/test_perf.py::test_perf[perf_sanity_upload-l0_gb200-r1_fp4_v2_tp4_mtp3_1k1k,r1_fp4_v2_tp4_mtp3_8k1k,r1_fp4_v2_tp4_mtp3_1k8k] TIMEOUT (180)
