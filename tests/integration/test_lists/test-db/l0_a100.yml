version: 0.0.1
l0_a100:
- condition:
    ranges:
      system_gpu_count:
        gte: 1
        lte: 1
    wildcards:
      gpu:
      - '*a100*'
      linux_distribution_name: ubuntu*
    terms:
      stage: pre_merge
      backend: "pytorch"
  tests:
    - unittest/llmapi/test_llm_pytorch.py -m "part0"
    - unittest/llmapi/test_llm_pytorch.py -m "part1"
    - unittest/llmapi/test_llm_pytorch.py -m "part2"
    - unittest/llmapi/test_llm_pytorch.py -m "part3"
    - unittest/llmapi/test_llm_encode.py
    - unittest/llmapi/test_llm_encode_multi_item.py
    - unittest/llmapi/test_mpi_session.py ISOLATION
    - unittest/llmapi/test_memory_profiling.py::test_profile_kvcache # profile kvcache for vision encoder
    - unittest/llmapi/test_memory_profiling.py::test_pyexecutor_and_kvcache_share_execution_stream # test that PyExecutor and KVCacheManager share the same execution_stream
    # executor
    - unittest/executor/test_base_worker.py ISOLATION
    - unittest/executor/test_rpc_proxy.py
    - unittest/executor/test_rpc_worker.py
    # llm.encode() accuracy
    - accuracy/test_llm_api_pytorch_encode.py::TestEncoderEncode::test_encoder_encode_matches_huggingface_classification[bert-yelp-eager]
    - accuracy/test_llm_api_pytorch_encode.py::TestEncoderEncode::test_encoder_encode_matches_huggingface_classification[bert-yelp-cuda_graph]
    - accuracy/test_llm_api_pytorch_encode.py::TestEncoderEncode::test_encoder_encode_cuda_graph_matches_eager_logits[bert-yelp]
    - accuracy/test_llm_api_pytorch_encode.py::TestEncoderEncode::test_encoder_encode_matches_huggingface_per_token_reward[qwen2.5-prm-7b]
    - accuracy/test_llm_api_pytorch_encode.py::TestDecoderEncode::test_decoder_encode_matches_huggingface[tinyllama-1.1b]
    - accuracy/test_llm_api_pytorch_encode.py::TestDecoderEncode::test_decoder_encode_matches_huggingface[gemma-3-1b]
    - accuracy/test_llm_api_pytorch_encode.py::TestDecoderEncode::test_decoder_encode_matches_huggingface[phi-4-mini]
    - accuracy/test_llm_api_pytorch_encode.py::TestDecoderEncode::test_decoder_encode_matches_huggingface[qwen2-7b]
    - accuracy/test_llm_api_pytorch_encode.py::TestDecoderEncode::test_decoder_encode_matches_huggingface[qwen3-0.6b]
    - accuracy/test_llm_api_pytorch_encode.py::TestDecoderEncode::test_decoder_encode_matches_huggingface[starcoder2-3b]
    - accuracy/test_llm_api_pytorch_encode.py::TestDecoderEncode::test_decoder_encode_cuda_graph_matches_eager_logits[tinyllama-1.1b]
    # Moved from l0_a10.yml: Llama-7B + KV cache + spec resources OOM on A10's 22 GB.
    - test_e2e.py::test_openai_lora
    - test_e2e.py::test_trtllm_serve_lora_example
- condition:
    ranges:
      system_gpu_count:
        gte: 1
        lte: 1
    wildcards:
      gpu:
      - '*a100*'
      linux_distribution_name: ubuntu*
    terms:
      stage: post_merge
      backend: pytorch
  tests:
  - unittest/llmapi/test_llm.py -m "part0"
  - unittest/llmapi/test_llm.py -m "not part0" TIMEOUT (90)
- condition:
    ranges:
      system_gpu_count:
        gte: 1
        lte: 1
    wildcards:
      gpu:
      - '*a100*'
      linux_distribution_name: ubuntu*
    terms:
      stage: post_merge
      backend: fmha
  tests:
  - test_fmha.py::test_fmha TIMEOUT (180) # Longer timeout for A100 as it builds all the architectures
