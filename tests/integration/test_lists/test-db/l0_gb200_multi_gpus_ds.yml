version: 0.0.1
l0_gb200_multi_gpus_ds:
- condition:
    ranges:
      system_gpu_count:
        gte: 4
        lte: 4
    wildcards:
      gpu:
      - '*gb200*'
      linux_distribution_name: ubuntu*
      cpu: aarch64
    terms:
      stage: pre_merge
      backend: pytorch
  tests:
  - unittest/_torch/modules/test_engram.py
  - unittest/_torch/modules/test_mhc.py
