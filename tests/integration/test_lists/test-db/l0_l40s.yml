version: 0.0.1
l0_l40s:
- condition:
    ranges:
      system_gpu_count:
        gte: 1
        lte: 1
    wildcards:
      gpu:
      - '*l40s*'
      linux_distribution_name: ubuntu*
    terms:
      stage: pre_merge
      backend: pytorch
  tests:
  # ------------- PyTorch tests ---------------
  # Multimodal modeling tests
  - unittest/_torch/modeling -k "modeling_siglip"
  - unittest/_torch/modeling -k "modeling_vila"
  - unittest/_torch/modeling -k "modeling_nemotron_nano_v2_vl"
  - unittest/_torch/modeling/test_modeling_llava_next.py::TestLlavaNext::test_all
  - unittest/_torch/modeling/test_modeling_llava_next.py::test_llava_next_expand_prompt_token_ids_for_mm
  - unittest/_torch/modeling/test_modeling_qwen2_5vl.py::TestQwen2_5_VL::test_all
  - unittest/_torch/modeling/test_modeling_qwen3vl_moe.py::TestQwen3VLMoe::test_all
  - unittest/_torch/modeling/test_modeling_qwen3vl.py::TestQwen3VL::test_all
  - unittest/_torch/modeling/test_modeling_qwen3vl.py::test_qwen3vl_init_preserves_caller_quant_config
  - unittest/_torch/modeling/test_modeling_cosmos3.py::TestCosmos3::test_all
  - unittest/_torch/modeling/test_modeling_step3p7vl.py
  - test_e2e.py::test_ptp_scaffolding[DeepSeek-R1-Distill-Qwen-7B-DeepSeek-R1/DeepSeek-R1-Distill-Qwen-7B]
  - unittest/llmapi/apps/_test_openai_chat_multimodal.py::test_single_chat_session_image_embeds -m needs_l40s
  # Encoder-only /v1/embeddings dynamic batching (BERT classifier + PRM-7B reward + Qwen3-Embedding)
  - unittest/llmapi/apps/_test_openai_embeddings.py
  # Qwen3-Embedding text-embedding accuracy vs HuggingFace (0.6B small/fast + 8B large)
  - accuracy/test_llm_api_pytorch_encode.py::TestEncoderEncode::test_qwen3_text_embedding_matches_huggingface[qwen3-embedding-0.6b]
  - accuracy/test_llm_api_pytorch_encode.py::TestEncoderEncode::test_qwen3_text_embedding_matches_huggingface[qwen3-embedding-8b]
  # AutoDeploy: Nemotron-Nano-V3 on Ada uses flashinfer; trtllm has no
  # (E4M3 input, BF16 output, paged_kv, head_dim=128, sm_89) FMHA cubin.
  - accuracy/test_llm_api_autodeploy.py::TestNemotronNanoV3::test_accuracy[fp8-1-attn_dp_off-flashinfer]
- condition:
    ranges:
      system_gpu_count:
        gte: 1
        lte: 1
    wildcards:
      gpu:
      - '*l40s*'
      linux_distribution_name: ubuntu*
    terms:
      stage: post_merge
      backend: tensorrt
  tests:
  # ------------- TRT tests ---------------
  - accuracy/test_llm_api.py::TestLlama3_1_8B::test_fp8_rowwise
  - examples/test_nemotron_nas.py::test_nemotron_nas_summary_1gpu[DeciLM-7B]
  - llmapi/test_llm_examples.py::test_llmapi_quickstart
  - examples/visual_gen/test_visual_gen.py::test_visual_gen_quickstart
  - examples/visual_gen/test_visual_gen.py::test_visual_gen_api_walkthrough
  - llmapi/test_llm_examples.py::test_llmapi_example_inference
  - llmapi/test_llm_examples.py::test_llmapi_example_inference_async
  - llmapi/test_llm_examples.py::test_llmapi_example_inference_async_streaming
  - llmapi/test_llm_examples.py::test_llmapi_example_multilora
  - llmapi/test_llm_examples.py::test_llmapi_example_guided_decoding
  - llmapi/test_llm_examples.py::test_llmapi_example_logits_processor
  - examples/test_llm_api_with_mpi.py::test_llm_api_single_gpu_with_mpirun[TinyLlama-1.1B-Chat-v1.0]
- condition:
    ranges:
      system_gpu_count:
        gte: 1
        lte: 1
    wildcards:
      gpu:
      - '*l40s*'
      linux_distribution_name: ubuntu*
    terms:
      stage: post_merge
      backend: tensorrt
  tests:
  - examples/test_nemotron.py::test_llm_nemotron_3_8b_1gpu[bfloat16-fp8] # 18mins
  - examples/test_whisper.py::test_llm_whisper_general[large-v3-disable_gemm_plugin-disable_attention_plugin-disable_weight_only-float16-nb:1-use_python_runtime] # 8 mins
  - examples/test_granite.py::test_granite_bf16_lora[granite-3.0-1b-a400m-instruct] TIMEOUT (90)
- condition:
    ranges:
      system_gpu_count:
        gte: 1
        lte: 1
    wildcards:
      gpu:
      - '*l40s*'
      linux_distribution_name: ubuntu*
    terms:
      stage: post_merge
      backend: fmha
  tests:
  - test_fmha.py::test_fmha TIMEOUT (90)
