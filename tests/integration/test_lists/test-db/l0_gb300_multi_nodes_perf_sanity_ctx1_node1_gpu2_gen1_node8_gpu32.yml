version: 0.0.1
l0_gb300_multi_nodes_perf_sanity_ctx1_node1_gpu2_gen1_node8_gpu32:
- condition:
    ranges:
      # 1 ctx worker with each 1 node and 2 GPUs
      # 1 gen worker with each 8 node and 32 GPUs
      system_gpu_count:
        gte: 36
        lte: 36
    wildcards:
      gpu:
      - '*gb300*'
    terms:
      stage: post_merge
      backend: pytorch
  tests:
  # glm-5-fp4
  - perf/test_perf_sanity.py::test_e2e[disagg_upload-gen_only-gb300_glm-5-fp4_1k1k_con512_ctx1_dep2_gen1_dep32_eplb0_mtp3_ccb-NIXL] TIMEOUT (120)
  - perf/test_perf_sanity.py::test_e2e[disagg_upload-gen_only-gb300_glm-5-fp4_8k1k_con512_ctx1_dep2_gen1_dep32_eplb0_mtp3_ccb-NIXL] TIMEOUT (120)
