# Target-only randomized query accuracy. Each request contains image, audio,
# and video with random distractors, but asks for one seeded random target modality.
# References were measured on dlcluster B100 job 1068768 while exact B200 access
# was unavailable. Native paired mixed-vs-pure validation passed on B100 job 1102129;
# see slop/mixed-modality-integration-test/log.md.
nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-BF16:
  - accuracy: 70.00
    num_samples: 50
nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-FP8:
  - quant_algo: FP8
    kv_cache_quant_algo: FP8
    accuracy: 72.00
    num_samples: 50
nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4:
  - quant_algo: MIXED_PRECISION
    kv_cache_quant_algo: FP8
    accuracy: 72.00
    num_samples: 50
