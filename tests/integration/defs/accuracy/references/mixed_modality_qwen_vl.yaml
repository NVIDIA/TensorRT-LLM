# Target-only randomized query accuracy for the Qwen-VL image+video mixed task.
# Each request carries an image and a video; the evaluator asks an image
# question (video distractor) on some samples and a video question (image
# distractor) on others, scoring BOTH image and video as targets. The
# image-target and video-target mixed-vs-pure deltas are gated independently by
# MixedModalityEvaluator; this reference is the absolute mixed target-accuracy
# floor.
#
# Provisional floor pending a measured B100/B200 run on a node that can build
# the decode-attention CUDA graph. Qwen3-VL-8B scores 55.11 on pure MMMU
# (image); the mixed target accuracy averages the (typically harder) video
# target with the image target, so the floor sits below the pure image number.
# Update with the observed value once the gate runs green.
Qwen/Qwen3-VL-8B-Instruct:
  - accuracy: 45.00
    num_samples: 50
