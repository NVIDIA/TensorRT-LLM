# Verl configuration for CI stage

verl_config:
  repo_url: "https://github.com/volcengine/verl.git"
  repo_tag: "d324b01"
  test_dir: "tests"

  install_commands:
    # Install gdrcopy (skip if already installed; build as user, install with sudo
    # so the install step works under both root and non-root LOCAL_USER setups)
    - >-
      if [ ! -f /usr/local/lib/libgdrapi.so ]; then
      rm -rf gdrcopy &&
      git clone -b v2.5.1 https://github.com/NVIDIA/gdrcopy.git &&
      (cd gdrcopy && make lib && sudo make prefix=/usr/local lib_install) &&
      rm -rf gdrcopy;
      fi
    # Install nvshmem
    - "sudo -H pip install nvidia-nvshmem-cu13==3.3.20"
    # Create nvshmem symlink (needed before DeepEP build).
    # Use the pip-installed nvshmem tree: /usr/local/cuda/.../lib does not
    # ship libnvshmem_device.a, so DeepEP's -dlink step cannot resolve
    # nvshmem device symbols there; the pip wheel ships the .a we need.
    # The site-packages tree is root-owned, so sudo is required for `ln`.
    - "sudo ln -sf libnvshmem_host.so.3 /usr/local/lib/python3.12/dist-packages/nvidia/nvshmem/lib/libnvshmem_host.so"
    # Install DeepEP
    - >-
      git clone -b hybrid-ep https://github.com/deepseek-ai/DeepEP.git &&
      (cd DeepEP &&
      export CPATH=/usr/local/cuda/targets/$(uname -m | sed 's/aarch64/sbsa-linux/;s/x86_64/x86_64-linux/')/include/cccl:$CPATH &&
      TORCH_CUDA_ARCH_LIST="9.0 10.0 12.0" python setup.py install --user) &&
      rm -rf DeepEP
    # Install Python dependencies
    - "sudo -H pip3 install --no-cache-dir --no-deps trl==0.27.0"
    - "sudo -H pip3 install --no-cache-dir nvtx matplotlib liger_kernel cachetools"
    - "sudo -H pip3 install --no-cache-dir cupy-cuda12x==14.0.1"
    - "sudo -H pip install --no-cache-dir -U git+https://github.com/ISEEKYAN/mbridge.git@641a5a0"
    - "sudo -H pip install --no-deps --no-cache-dir git+https://github.com/NVIDIA/Megatron-LM.git@core_v0.16.0"
    - "sudo -H pip3 install pytest-asyncio"
    - "sudo -H pip3 install --no-cache-dir 'ray[default]==2.54.1'"


  # The environment variables to expose in the container before setting up
  env_vars:
    # NVSHMEM_DIR is consumed only by DeepEP's setup.py at build time (needs
    # libnvshmem_device.a, which only ships in the pip wheel — the system
    # nvshmem tree at /usr/local/cuda/targets/x86_64-linux/lib has host libs
    # only). Do NOT prepend it to LD_LIBRARY_PATH: the pip wheel is v3.3.20
    # while torch's libtorch_nvshmem.so needs the v3.6.5 host lib for the
    # versioned symbol nvshmem_selected_device_transport, which lives in
    # /usr/local/cuda/targets/x86_64-linux/lib.
    - "NVSHMEM_DIR=/usr/local/lib/python3.12/dist-packages/nvidia/nvshmem"
    - "LD_LIBRARY_PATH=\"/usr/local/cuda/targets/x86_64-linux/lib:$LD_LIBRARY_PATH\""
    - "PATH=\"/usr/local/cuda/targets/x86_64-linux/bin:$PATH\""
    - "TRTLLM_TEST_MODEL_PATH_ROOT=/tmp/verl-models"
    - "TORCH_CUDA_ARCH_LIST="
    - "RAY_enable_open_telemetry_on_core_worker=0"

  # Read-only CI model cache (flat layout: /scratch.../ModelName)
  ci_model_cache: "/scratch.trt_llm_data/llm-models"

  # Models needed by verl tests (symlinks created from HF-style to CI cache paths)
  required_models:
    - "Qwen/Qwen2.5-0.5B-Instruct"
    - "Qwen/Qwen2.5-1.5B-Instruct"
    - "Qwen/Qwen2.5-VL-7B-Instruct"
