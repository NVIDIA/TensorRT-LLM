hostname: localhost
model: DeepSeek-V3-Lite/bf16
backend: pytorch
cuda_graph_config: null
free_gpu_memory_fraction: 0.15
conditional_disagg_config:
  max_local_prefill_length: 100
disable_overlap_scheduler: true
enable_autotuner: false
context_servers:
  num_instances: 1
  tensor_parallel_size: 1
  pipeline_parallel_size: 1
  kv_cache_config:
    enable_block_reuse: true
    enable_partial_reuse: true
    event_buffer_max_size: 1024
    free_gpu_memory_fraction: 0.15
    # V2 cache manager — Python-native KV pool + radix tree.
    use_kv_cache_manager_v2: true
  cache_transceiver_config:
    # V2 transceiver — Python-side NIXL driver, paired with cache manager V2.
    backend: NIXL
    transceiver_runtime: PYTHON
generation_servers:
  num_instances: 1
  tensor_parallel_size: 1
  pipeline_parallel_size: 1
  router:
    type: kv_cache_aware
    # disagg-gen path doesn't emit kv_cache_events; backfill router-side state from
    # successfully-routed requests so conditional_disagg can actually trigger.
    backfill_block_hashes_on_finish: true
  kv_cache_config:
    enable_block_reuse: true
    enable_partial_reuse: true
    event_buffer_max_size: 1024
    free_gpu_memory_fraction: 0.15
    use_kv_cache_manager_v2: true
  cache_transceiver_config:
    backend: NIXL
    transceiver_runtime: PYTHON
