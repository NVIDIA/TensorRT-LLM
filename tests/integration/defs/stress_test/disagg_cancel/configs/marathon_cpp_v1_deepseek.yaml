# C++ transceiver marathon: V1 KV cache + C++ transceiver + NIXL, DeepSeek-class MLA.
#
# Exercises the C++-backed disagg path (BindKvCacheTransceiver + V1
# KVCacheManager + NIXL backend) — the configuration NVBug 6104831
# was filed against and that the in-flight cancellation fix stabilizes. Schema
# documentation lives in ../README.md.

hostname: localhost
model: DeepSeek-V3-Lite/bf16
backend: pytorch

context_servers:
  num_instances: 3                  # 3P3D cluster (3 context + 3 generation workers)
  tensor_parallel_size: 1
  pipeline_parallel_size: 1
  disable_overlap_scheduler: false  # overlap ON
  max_num_tokens: 16384
  max_seq_len: 16384
  enable_chunked_prefill: true
  kv_cache_config:
    enable_block_reuse: true        # block reuse ON
    enable_partial_reuse: true
    free_gpu_memory_fraction: 0.3
    use_kv_cache_manager_v2: false  # V1 KV cache (default)
  cache_transceiver_config:
    backend: NIXL
    transceiver_runtime: CPP        # C++ transceiver (default; explicit for clarity)
    max_tokens_in_buffer: 16384
    kv_transfer_timeout_ms: 60000   # production default

generation_servers:
  num_instances: 3
  tensor_parallel_size: 1
  pipeline_parallel_size: 1
  disable_overlap_scheduler: false
  max_num_tokens: 16384
  max_seq_len: 16384
  enable_chunked_prefill: true
  kv_cache_config:
    enable_block_reuse: true
    enable_partial_reuse: true
    free_gpu_memory_fraction: 0.3
    use_kv_cache_manager_v2: false
  cache_transceiver_config:
    backend: NIXL
    transceiver_runtime: CPP
    max_tokens_in_buffer: 16384
    kv_transfer_timeout_ms: 60000

# ============================================================================
# Stress harness configuration (consumed by harness.py::StressConfig).
# Schema documented in ../README.md.
# ============================================================================
stress_config:
  # MODE SWITCH (intentionally loud):
  # - log_only: current registered CI mode. Launches the real disagg cluster,
  #   sends normal non-cancel probes, and scans saved worker/server logs for
  #   UAF, broken-promise, and segmentation-fault signatures. This mode does
  #   NOT require in-flight cancellation or poison-buffer support.
  # - full_cancel_poison: future opt-in mode after in-flight cancellation and
  #   poison-buffer hardening are available. It enables the cancellation load,
  #   fault injections, token-equivalent canaries, and KV-growth checks below.
  mode: log_only
  duration_min: 10                   # regular guardrail run; use 120 for full_cancel_poison

  # Backend-knob axis selectors. Must match
  # context_servers / generation_servers above.
  kv_cache_manager: v1               # V1 (C++) KV cache manager
  transceiver: cpp                   # C++-backed transceiver (BindKvCacheTransceiver)

  log_only_probe:
    interval_s: 30
    prompt: "Write one sentence about reliable distributed inference."
    max_tokens: 32
    seed: 42
    request_timeout_s: 30

  base_concurrency: 64
  client_cancel_rate: 0.10
  input_length:
    distribution: uniform
    min_tokens: 4096
    max_tokens: 12288
  output_length: 512

  bursts:
    interval_min: 8
    concurrency: 256
    duration_s: 60
    input_length:
      distribution: uniform
      min_tokens: 12288
      max_tokens: 16384

  injections:
    - at_min: 15
      type: sigstop
      target: gen_worker_random
      duration_s: 20
    - at_min: 30
      type: sigstop
      target: gen_worker_random
      duration_s: 30
    - at_min: 45
      type: sigstop
      target: ctx_worker_random
      duration_s: 20
    - at_min: 60
      type: sigkill
      target: gen_worker_0
      respawn_within_s: 60
    - at_min: 75
      type: sigstop
      target: gen_worker_random
      duration_s: 20
    - at_min: 90
      type: sigstop
      target: ctx_worker_random
      duration_s: 30
    - at_min: 105
      type: sigstop
      target: gen_worker_random
      duration_s: 20

  canary:
    prompts_file: stress_canary_prompts.json
    rate_per_min: 5
    greedy_decoding: true
    seed: 42
    max_tokens: 128
    check_token_equivalent: true
    error_rate_overall_max: 0.01
    error_rate_injection_window_max: 0.10
    recovery_time_max_s: 30

  log_scan:
    hard_zero_patterns:
      - "Broken promise"
      - "Segfault"
      - "Segmentation fault"
      - "SIGSEGV"
      - "0xffffffffffffffff"
      - "use-after-free"
      - "heap-use-after-free"
      - "AddressSanitizer:.*use-after-free"
      - "double[- ]free"

  kv_cache_growth_max: 0.10   # final utilization ≤ baseline + 10 percentage points
