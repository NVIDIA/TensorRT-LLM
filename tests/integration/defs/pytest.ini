[pytest]
asyncio_default_fixture_loop_scope = module
threadleak = True
# Thread-\d+ \(_manager_spawn\) / session-reuse-* / session-prefetch-* belong to
# a pool cached for reuse by the NEXT test (tests/test_common/session_reuse.py)
# or prefetched for it (tests/test_common/session_prefetcher.py) and legitimately
# outlive the test they start under.
threadleak_exclude = asyncio_\d+|Thread-\d+ \(_manager_spawn\)|session-reuse-\w+|session-prefetch-\w+
junit_family=legacy
addopts = --ignore-glob="*perf/test_perf.py"  --ignore-glob="*perf/disagg/*"  --ignore-glob="*test_list_validation.py"  --ignore-glob="*llm-test-workspace*"  --durations=0 -W ignore::DeprecationWarning --unused-fixtures -p test_common.session_reuse_hooks -p test_common.session_prefetcher_hooks
pythonpath =
    ../../../examples/auto_deploy ../../
norecursedirs = ./triton/perf ./perf/disagg
unused_fixtures_ignore_path =
    cpp
    ../../unittest
markers =
    skip_less_device: skip when less device detected than the declared
    skip_less_mpi_world_size: skip when less mpi world size detected than the declared
    skip_less_device_memory: skip when less device memory detected than the requested
    skip_less_host_memory: skip when less host memory detected than the requested
    support_fp8: skip when fp8 is not supported on the device
    skip_device_not_contain: skip when the device does not contain the specified keyword
    timeout: set test timeout in seconds
