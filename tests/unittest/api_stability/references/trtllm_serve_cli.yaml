        - "-l"
      metadata_server_config_file:
        type: str
        default: null
        status: prototype
        flags:
        - "--metadata_server_config_file"
        - "-m"
      metrics_log_interval:
        type: int
        default: 0
        status: deprecated
      request_timeout:
        type: int
        default: 180
        status: beta
        flags:
        - "--request_timeout"
        - "-r"
      schedule_style:
        type: Choice(['context_first', 'generation_first'])
        default: null
        status: beta
        flags:
        - "--schedule_style"
        - "-s"
      server_start_timeout:
        type: int
        default: 180
        status: beta
        flags:
        - "--server_start_timeout"
        - "-t"

  disaggregated_mpi_worker:
    options:
      config_file:
        type: str
        default: null
        status: beta
        flags:
        - "--config"
        - "--config_file"
        - "-c"
      log_level:
        type: Choice(['debug', 'error', 'info', 'internal_error', 'trace', 'verbose', 'warning'])
        default: info
        status: beta

  mm_embedding_serve:
    options:
      allow_request_chat_template:
        type: bool
        default: false
        status: prototype
      extra_encoder_options:
        type: str
        default: null
        status: prototype
        flags:
        - "--config"
        - "--extra_encoder_options"
      free_gpu_memory_fraction:
        type: float
        default: 0.9
        status: beta
      gpus_per_node:
        type: int
        default: null
        status: beta
      host:
        type: str
        default: localhost
        status: beta
      log_level:
        type: Choice(['debug', 'error', 'info', 'internal_error', 'trace', 'verbose', 'warning'])
        default: info
        status: beta
      max_batch_size:
        type: int
        default: 2048
        status: beta
      max_num_tokens:
        type: int
        default: 16384
        status: beta
      metadata_server_config_file:
        type: str
        default: null
        status: prototype
      port:
        type: int
        default: 8000
        status: beta
      revision:
        type: str
        default: null
        status: beta
        flags:
        - "--hf_revision"
        - "--revision"
      telemetry:
        type: bool
        default: true
        status: beta
        flags:
        - "--no-telemetry"
        - "--telemetry"
      tensor_parallel_size:
        type: int
        default: 1
        status: beta
        flags:
        - "--tensor_parallel_size"
        - "--tp_size"
      trust_remote_code:
        type: bool
        default: false
        status: beta
