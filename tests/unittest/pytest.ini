[pytest]
xdist_start_method = spawn
asyncio_default_fixture_loop_scope = module
threadleak = True
# ThreadPoolExecutor-\d+_\d+ excludes worker threads leaked by torch._dynamo/torch.compile.
# Thread-\d+ \(_manager_spawn\) is the MPIPoolExecutor manager thread of a pool cached
# for reuse by the NEXT test, and session-reuse-* are the reuse layer's own threads
# (tests/test_common/session_reuse.py); they legitimately outlive the test they start under.
threadleak_exclude = asyncio_\d+|rpc_client_loop|rpc_client_worker_\d+|rpc_server_worker_\d+|InductorSubproc|subproc_worker_timer|ThreadPoolExecutor-\d+_\d+|Thread-\d+ \(_manager_spawn\)|session-reuse-\w+
addopts = --durations=0 -W ignore::DeprecationWarning -p test_common.session_reuse_hooks
pythonpath =
    auto_deploy/_utils_test
    ../../examples/auto_deploy
    ../../examples/models/core
    ../../examples
    ../
env =
    D:AUTO_DEPLOY_LOG_LEVEL=INFO
markers =
    part0
    part1
    part2
    part3
    part4
    cpu_only: this test does not require a GPU to run
    gpu2: this test uses 2 GPUs
    gpu4: this test uses 4 GPUs
    post_merge: this test should only run in post merge
    high_cuda_memory: this test uses a lot of CUDA memory (typically more than 12GB)
    no_xdist: this test should not run when using pytest-xdist
    ray: mark Ray-based tests
    mpi_ray_parity: parametrize a test to also run with Ray executor variant
