# Files to be subjected to static analysis
static-analysis-files: &static_analysis_files |
    (?x)^(
        tensorrt_llm/_torch/pyexecutor/sampler/sampler.py |
        tensorrt_llm/_torch/pyexecutor/sampler/sampling_utils.py |
        tensorrt_llm/_torch/pyexecutor/sampler/ops/interface.py |
        tensorrt_llm/_torch/pyexecutor/sampler/ops/flashinfer.py |
        tensorrt_llm/_torch/pyexecutor/sampler/ops/vanilla.py |
        tests/unittest/_torch/sampler/test_torch_sampler.py |
        tests/unittest/_torch/sampler/test_beam_search.py |
        tests/unittest/_torch/sampler/test_beam_search_util.py |
    )$

# Global exclude: vendored code + trtllm-gen FMHA artifacts (cubin pointers, export headers, cuda_ptx)
exclude: '(^3rdparty/sha256/|^triton_kernels/|trtllmGenKernels/fmha/cubin/kernelMetaInfo\.h$|cubin\.cpp$|cubin\.h$|trtllmGenKernels/fmha/trtllmGen_fmha_export/|trtllmGenKernels/fmha/cuda_ptx/)'

default_install_hook_types: [pre-commit, commit-msg]
repos:
-   repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
    -   id: isort
        files: *common_files
-   repo: https://github.com/Lucas-C/pre-commit-hooks.git
    rev: v1.5.5
    hooks:
    -   id: remove-crlf
-   repo: https://github.com/google/yapf
    rev: v0.43.0
    hooks:
    -   id: yapf
        files: *common_files
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
    -   id: check-added-large-files
    -   id: check-merge-conflict
    -   id: check-symlinks
    -   id: detect-private-key
    -   id: end-of-file-fixer
    -   id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
        exclude: ".*/gitlab/.*.yml"
    -   id: trailing-whitespace
        exclude: '(\.(patch|md)|scripts/attribution/data/cas/.*)$'
    -   id: check-toml
    -   id: mixed-line-ending
        args: [--fix=lf]
        files: ".*/auto_deploy/.*"
    -   id: debug-statements
        files: ".*/auto_deploy/.*"
    -   id: check-json
        files: ".*/auto_deploy/.*"
        exclude: >
          (?x)^(
            .*\.vscode/.*\.json | # vscode files can take comments
            .*\.devcontainer/.*\.json # devcontainer json files can take comments
          )$
    -   id: file-contents-sorter
        files: ^tests/integration/test_lists/waives\.txt$
-   repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
    -   id: autoflake
        additional_dependencies:
        - tomli
        args: ['--config', 'pyproject.toml']
        files: *common_files
-   repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v16.0.0
    hooks:
    -   id: clang-format
        types_or: [c++, c, cuda]
-   repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.10
    hooks:
    -   id: cmake-format
-   repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
    -   id: codespell
        additional_dependencies:
        - tomli
        # add ignore words list
        args: ["-L", "Mor,ans,thirdparty,subtiles,PARD,pard,indx,therefrom", "--skip", "ATTRIBUTIONS-*.md,*.svg", "--skip", "security_scanning/*", "--skip", "tensorrt_llm/_torch/visual_gen/jit_kernels/*"]
        exclude: 'scripts/attribution/data/cas/.*$'
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
    -   id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: *legacy_files
    -   id: ruff-format
        exclude: *legacy_files
-   repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
    -   id: mdformat
        additional_dependencies:
        - mdformat_frontmatter
        files: ".*/auto_deploy/.*"
-   repo: local
    hooks:
    -   id: model-registry-check
        name: Validate AutoDeploy model registry
        entry: python scripts/check_model_registry.py
        language: python
        additional_dependencies:
        - PyYAML
        files: ^examples/auto_deploy/model_registry/models\.yaml$
        pass_filenames: false
    -   id: ruff-legacy
        name: ruff-legacy (baseline-gated lint for legacy files)
        entry: python scripts/legacy_utils.py lint-precommit
        language: python
        additional_dependencies: [ruff]
        types: [python]
        files: *legacy_files
    -   id: verify-legacy-config
        name: verify legacy lint configs are up to date
        entry: python scripts/legacy_utils.py check-configs
        language: python
        additional_dependencies: [jinja2]
        always_run: true
        pass_filenames: false
    -   id: test lists format
        name: Check for tabs and multiple spaces in test_lists txt files
        entry: ./scripts/format_test_list.py
        language: script
        files: tests/integration/test_lists/.*\.txt$
    -   id: waive list check
        name: Checks for duplicated test items in waives.txt
        entry: ./scripts/check_test_list.py --check-duplicate-waives
        language: script
        pass_filenames: false
    -   id: validate-test-lists
        name: Validate test list entries exist in source files (AST)
        entry: ./scripts/check_test_list.py --validate
        language: script
        pass_filenames: false
    -   id: DCO check
        name: Checks the commit message for a developer certificate of origin signature
        entry: ./scripts/dco_check.py
        language: script
        stages: [commit-msg]
    -   id: pinned memory policy
        name: Disallow raw pinned-memory APIs in runtime code
        entry: ./scripts/check_pinned_memory_usage.py
        language: script
        files: ^(tensorrt_llm|triton_backend)/.*\.py$
    -   id: auto-deploy-import-discipline
        name: Enforce relative imports inside auto_deploy
        entry: python scripts/check_auto_deploy_imports.py
        language: python
        files: ^tensorrt_llm/_torch/auto_deploy/.*\.py$
    -   id: check-skill-naming-convention
        name: Check Claude Code skill naming convention
        entry: python scripts/check_skill_naming_convention.py
        language: python
        additional_dependencies:
        - PyYAML
        pass_filenames: false
        files: >-
          ^(\.claude/skills/[^/]+/SKILL\.md|\.claude/agents/.*\.md|scripts/check_skill_naming_convention\.py)$
    -   id:  type-check
        name: Run static analysis of type correctness using mypy
        entry: scripts/run_mypy.sh
        language: script
        verbose: true
        require_serial: true  # because of install_types=true
        files: *static_analysis_files
