# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# https://docs.coderabbit.ai/getting-started/configure-coderabbit/
# In PR, comment "@coderabbitai configuration" to get the full config including defaults
language: "en-US"
reviews:
  profile: chill
  auto_title_placeholder: '@coderabbitai title'
  auto_title_instructions: 'Format: "[<category>] <title>". Category must be one of: fix, feat, doc, infra, style, refactor, perf, test, chore, revert. Enclose the category in square brackets. Title should be concise (<= 60 chars). Example: "[feat] Add logit_bias support".'
  commit_status: false
  high_level_summary_instructions: |
    Produce two sections:

    **Dev Engineer Review**
    Correctness, performance, API consistency (CODING_GUIDELINES.md), error handling, regressions.

    **QA Engineer Review**
    If no test files are touched, write "No test changes."

    For test-list-only changes (only tests/integration/test_lists/ files):
    - Report which test-db/ or qa/ files were modified and what entries were added or removed.
    - When CBTS artifacts are available: verdict is "sufficient" if coverage passes,
      "insufficient" with the failing or missing evidence identified otherwise.
    - When CBTS artifacts are unavailable: verdict is "needs follow-up".

    For test-code changes (tests/** excluding tests/integration/test_lists/):
    - List test functions added, modified, or removed.
    - State whether each is covered in test-db/ (CI) or qa/ (manual QA).
    - Apply the same CBTS-aware verdict logic above.

    Keep feedback actionable: reference concrete list file names when suggesting additions.
  walkthrough_instructions: |
    For each changed file, include a concise QA perspective:
    - For test-code files (tests/** excluding tests/integration/test_lists/**): note what
      the test covers and whether it is listed in tests/integration/test_lists/test-db/ (CI)
      or tests/integration/test_lists/qa/ (manual QA).
    - For source files: note any observable behavior changes a QA engineer should verify
      (new code paths, changed APIs, altered defaults, removed functionality).
    - For configuration files (e.g. .coderabbit.yaml, *.yml, *.yaml, *.json, *.toml):
      note any review or workflow behavior changes introduced by the config update.
    Keep each entry to 1-2 sentences; omit if no QA-relevant impact.
  collapse_walkthrough: false
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  suggested_reviewers: true
  poem: false
  review_status: false
  auto_review:
    auto_incremental_review: true
    drafts: false
    base_branches: ["main", "release/.+"]
  path_instructions:
    - path: "tests/integration/test_lists/qa/**"
      instructions: |
        Files here are manually-triggered QA perf/regression lists, maintained
        by the QA team. They are NOT derived from, and do NOT need to mirror,
        the auto-run CI test-db under tests/integration/test_lists/test-db/.
        Do NOT suggest cross-syncing entries between qa/ and test-db/; coverage
        in one does not imply coverage in the other and is decided independently.
    - path: "tests/integration/test_lists/test-db/**"
      instructions: |
        Files here drive the auto-run CI test-db (per-GPU l0_*.yml tiers).
        Adding or removing entries here changes what CI runs either in every PR (pre-merge) or three times a day (post-merge).
        Do NOT suggest cross-syncing with the QA lists under
        tests/integration/test_lists/qa/.
knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns: ["**/CODING_GUIDELINES.md"]
