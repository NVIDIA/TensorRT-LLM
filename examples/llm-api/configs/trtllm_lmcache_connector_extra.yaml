# Extra LLM API options for trtllm-serve with the LMCache KV connector.
#
# Prerequisites:
#   - lmcache installed: pip install lmcache
#   - PyTorch backend (LMCache connector is wired through the PyTorch executor)
#
# Example:
#   trtllm-serve Qwen/Qwen2-1.5B-Instruct --backend pytorch --host 0.0.0.0 --port 8000 \
#     --trust_remote_code \
#     --extra_llm_api_options /path/to/this/file
#
# Or use the CLI shorthand (no YAML needed):
#   trtllm-serve Qwen/Qwen2-1.5B-Instruct --backend pytorch --kv-connector lmcache

kv_cache_config:
  enable_block_reuse: true
  max_tokens: 150000

kv_connector_config:
  connector: lmcache
