# 1-GPU Wan 2.2 T2V with NVFP4 dynamic quantization.
# Shared by offline examples (--visual_gen_args) and trtllm-serve.
quant_config:
  quant_algo: NVFP4
  dynamic: true
attention_config:
  backend: VANILLA
parallel_config:
  cfg_size: 1
  ulysses_size: 1
torch_compile_config:
  options:
    emulate_precision_casts: true
cuda_graph_config:
  enable: false
