# 4-GPU Wan 2.2 T2V with NVFP4 dynamic quantization.
# Shared by offline examples (--extra_visual_gen_options) and trtllm-serve.
quant_config:
  quant_algo: NVFP4
  dynamic: true
attention:
  backend: VANILLA
parallel:
  dit_cfg_size: 2
  dit_ulysses_size: 2
  parallel_vae_size: 4
cuda_graph:
  enable_cuda_graph: false
