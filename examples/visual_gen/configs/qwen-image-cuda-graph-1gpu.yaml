# 1-GPU Qwen-Image CUDA graph configuration. Quantization is read from the
# checkpoint, so this same runtime configuration can be used for BF16 and
# statically quantized ModelOpt checkpoints.
attention_config:
  backend: VANILLA
parallel_config:
  cfg_size: 1
  ulysses_size: 1
  tp_size: 1
cache_config: null
compilation_config:
  resolutions:
    - [1024, 1024]
  num_frames: [1]
  skip_warmup: false
torch_compile_config:
  enable: false
  enable_fullgraph: false
  enable_autotune: true
cuda_graph_config:
  enable: true
enable_layerwise_nvtx_marker: false
