# GB200 NVL72 GPU config for Cosmos3-Super 14B.
# See https://nvidia.github.io/TensorRT-LLM/blogs/tech_blog/blog25_Scaling_Video_Generation_Across_NVL72_Rack_with_TensorRT-LLM.html for background.
attention_config:
  backend: FA4
parallel_config:
  cfg_size: 2
  ulysses_size: 4
  attn2d_size: [3, 3]
  parallel_vae_size: 8
compilation_config:
  resolutions:
    - [720, 1280]
  num_frames:
    - 189
