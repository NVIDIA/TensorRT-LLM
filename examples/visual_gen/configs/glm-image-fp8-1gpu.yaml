# 1-GPU GlmImage text-to-image with FP8 dynamic quantization.
# Model: zai-org/GLM-Image
# Shared by offline examples (--visual_gen_args) and trtllm-serve.
#
# GlmImage constraints: single-GPU text-to-image only. Image-to-image
# conditioning, sequence/CFG parallelism, and caching are not yet supported.
quant_config:
  quant_algo: FP8
  dynamic: true
parallel_config:
  cfg_size: 1
  ulysses_size: 1
cuda_graph_config:
  enable: false
