# 1-GPU Qwen-Image-Layered quality preset with FP8 blockscale dynamic Linear
# quantization and SageAttention FP8. This keeps non-backbone Linear layers
# plus the first and last 12 transformer blocks in BF16, while quantizing the
# middle transformer blocks with FP8_BLOCK_SCALES.
#
# Qwen-Image-Layered has 60 transformer blocks, so N=12 means blocks 0-11 and
# 48-59 are excluded from quantization. Listing a parent module such as
# transformer_blocks.0 excludes all Linear layers under that block.
quant_config:
  quant_algo: FP8_BLOCK_SCALES
  dynamic: true
  ignore:
    - img_in
    - txt_in
    - norm_out
    - proj_out
    - transformer_blocks.0
    - transformer_blocks.1
    - transformer_blocks.2
    - transformer_blocks.3
    - transformer_blocks.4
    - transformer_blocks.5
    - transformer_blocks.6
    - transformer_blocks.7
    - transformer_blocks.8
    - transformer_blocks.9
    - transformer_blocks.10
    - transformer_blocks.11
    - transformer_blocks.48
    - transformer_blocks.49
    - transformer_blocks.50
    - transformer_blocks.51
    - transformer_blocks.52
    - transformer_blocks.53
    - transformer_blocks.54
    - transformer_blocks.55
    - transformer_blocks.56
    - transformer_blocks.57
    - transformer_blocks.58
    - transformer_blocks.59
attention_config:
  backend: TRTLLM
  quant_attention_config:
    qk_dtype: fp8
    v_dtype: fp8
    q_block_size: 1
    k_block_size: 1
    v_block_size: 1
parallel_config:
  cfg_size: 1
  ulysses_size: 1
cuda_graph_config:
  enable: false
