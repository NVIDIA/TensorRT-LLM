# CPU offload selected Wan 2.2 T2V pipeline components.
# For trtllm-serve and benchmark scripts that consume --visual_gen_args.
# Supported only on Wan text-to-video pipelines (WanPipeline). The Wan I2V
# pipeline does not yet wrap its VAE/text encoder call sites with the offload
# context -- do not enable `vae`/`text_encoder` offloading there.
#
# With only `enable: true`, Wan picks per-model defaults:
#   - Wan 2.1 / 2.2 5B  -> [text_encoder, denoising_transformer]
#   - Wan 2.2 A14B      -> [text_encoder, denoising_transformer, denoising_transformer_2]
# To override (e.g. to also offload the VAE), set `stages` explicitly:
#   stages:
#     - text_encoder
#     - denoising_transformer
#     - denoising_transformer_2
#     - vae
cpu_offload_config:
  enable: true
cuda_graph_config:
  enable: false
