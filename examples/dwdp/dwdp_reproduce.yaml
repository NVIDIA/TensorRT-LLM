# DWDP reproduction matrix.
#
# This file defines only experiment-level benchmark settings. Cluster-, model-,
# and dataset-specific paths belong in ``env.yaml``.

experiment_defaults:
  ratio: 0.8
  isl_std: 0
  enable_dp: true

experiments:
  # Naming convention:
  # - `*_minus_1` means fewer context servers than the main case.
  # Context-only reproduction.
  - name: "context_only_dep"
    dataset_key: "context_only_ratio_08"
    isl: 8192
    osl: 1
    num_ctx_servers: 1
    ctx_tp: 4
    num_gen_servers: 1
    gen_tp: 4
    batch: 64
    gen_max_tokens: 256
    ctx_max_bs: 64
    ctx_max_num_tokens: 33000
    mtp: 0
    eplb: 0
    prefetch: 0
    dwdp: false
    dwdp_group: 1

  - name: "context_only_dwdp"
    dataset_key: "context_only_ratio_08"
    isl: 8192
    osl: 1
    num_ctx_servers: 4
    ctx_tp: 1
    num_gen_servers: 1
    gen_tp: 4
    batch: 64
    gen_max_tokens: 256
    ctx_max_bs: 64
    ctx_max_num_tokens: 33000
    mtp: 0
    eplb: 0
    prefetch: 64
    dwdp: true
    dwdp_group: 1

  # End-to-end reproduction: 20-40 TPS / user.
