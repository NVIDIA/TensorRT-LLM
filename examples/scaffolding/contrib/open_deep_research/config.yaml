# Open Deep Research configuration
# Pass this file to each MCP server:  uv run <server>.py --config path/to/this.yaml
# Pass the same file to the runner:   python run_deep_research.py --config path/to/this.yaml

# ---- API keys (MCP servers with --config read these top-level keys) ----
tavily_api_key: ""
tavily_api_url: "https://api.tavily.com/search"
search_api_key: ""
search_api_url: "https://serpapi.com/search"
jina_api_key: ""
scraper_api_key: ""

# Python sandbox:
#   The `coder_mcp` tool is served by examples/scaffolding/mcp/coder/coder_mcp.py,
#   which talks to the Apiary daemon directly via ApiarySessionMux (no standalone gateway).
#   Pass Apiary URL / default image to coder_mcp.py via CLI flags
#   (--apiary-url, --default-image). The runner connects to coder_mcp at
#   mcp_tools.coder_mcp host/port.

# ---- Per-tool MCP ----
mcp_tools:
  tavily_search:
    host: "0.0.0.0"
    port: 8087
  # google_search:
  #   host: "0.0.0.0"
  #   port: 8083
  google_scholar:
    host: "0.0.0.0"
    port: 8084
  fetch_webpage:
    host: "0.0.0.0"
    port: 8085
  coder_mcp: # Apiary-backed Python/shell/file tools
    host: "0.0.0.0"
    port: 8086

mcp_client_host: "127.0.0.1"

# ---- Runner (run_deep_research.py) ----
openai_api_key: "tensorrt_llm"
base_url: "http://localhost:8000/v1"
model: "Qwen/Qwen2.5-72B-Instruct"
max_turn: 25
max_tokens: 16384
