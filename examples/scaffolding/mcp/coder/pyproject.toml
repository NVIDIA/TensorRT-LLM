[project]
name = "coder-mcp"
version = "0.1.0"
description = "MCP Server for Coder agent tools (file operations, shell commands, etc.)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "uvicorn>=0.30.0",
    "starlette>=0.37.0",
    "httpx>=0.28.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
