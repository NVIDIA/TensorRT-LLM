max_batch_size: 384
max_seq_len: 65536 # tunable
enable_chunked_prefill: true
attn_backend: trtllm
cuda_graph_config:
  batch_sizes: [1, 2, 4, 8, 16, 24, 32, 64, 128, 256, 320, 384]
kv_cache_config:
  free_gpu_memory_fraction: 0.88
transforms:
  apply_sharding_hints:
    # Mamba (layer_type="ssm") in_proj is a fused [z|x|B|C|dt] weight. Its dt
    # slice equals mamba_num_heads (=64 here), which cannot be NVFP4-aligned
    # (multiple of 32) when TP-split at this world size (64 < 4*32), and it must
    # stay head-consistent with z/x. So the Mamba block is not TP-shardable under
    # NVFP4 for this model; replicate it (exclude "ssm") and shard only attention
    # ("mha") and MoE ("moe"). Larger Nemotron variants (Super/Ultra) have enough
    # mamba heads to shard, so this filter is per-model (kept out of their YAMLs).
    shard_layers: ['mha', 'moe', 'mlp']
  detect_sharding:
    allreduce_strategy: SYMM_MEM
    # NOTE: add 'tp' to sharding dims only for high-throughput runs
    # For low-latency, keep mamba and attention replicated
    sharding_dims: ['ep', 'bmm']
    # NOTE: sharding_source applies only to TP sharding
    sharding_source: ['manual']
    manual_config:
      head_dim: 128
      tp_plan:
        # mamba SSM layer
        "in_proj": "mamba"
        "out_proj": "rowwise"
        # attention layer
        "q_proj": "colwise"
        "k_proj": "colwise"
        "v_proj": "colwise"
        "o_proj": "rowwise"
        # NOTE: consider not sharding shared experts and/or
        # latent projections at all, keeping them replicated.
        # To do so, comment out the corresponding entries.
        # moe layer: SHARED experts
        "up_proj": "colwise"
        "down_proj": "rowwise"
        # MoLE: latent projections: simple shard
        "fc1_latent_proj": "gather"
        "fc2_latent_proj": "gather"
  multi_stream_moe:
    enabled: true
  gather_logits_before_lm_head:
    # TODO: fix https://github.com/NVIDIA/TensorRT-LLM/issues/9878 to enable by default
    enabled: true
  fuse_mamba_a_log:
    stage: post_load_fusion
    enabled: true
  insert_cached_ssm_attention:
    backend: flashinfer_ssm
  compile_model:
    piecewise_enabled: true
  fuse_nvfp4_moe:
    backend: trtllm_gen
  mlir_elementwise_fusion:
    enabled: true
