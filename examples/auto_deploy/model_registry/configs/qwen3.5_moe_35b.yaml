max_seq_len: 8192
max_num_tokens: 4096
max_batch_size: 512
cuda_graph_config:
  max_batch_size: 512
  batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512]
enable_chunked_prefill: true
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.8
  tokens_per_block: 32
model_kwargs:
  torch_dtype: bfloat16
