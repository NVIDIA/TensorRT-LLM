runtime: trtllm
compile_backend: torch-cudagraph
max_batch_size: 8
max_seq_len: 4096
enable_chunked_prefill: true
attn_backend: trtllm
model_factory: NemotronNanoOmniForConditionalGeneration
skip_loading_weights: false
cuda_graph_config:
  max_batch_size: 8
  batch_sizes: [1, 2, 4, 8]
kv_cache_config:
  free_gpu_memory_fraction: 0.88
  mamba_ssm_cache_dtype: auto
transforms:
  detect_sharding:
    allreduce_strategy: SYMM_MEM
    sharding_dims: ['ep', 'bmm']
    sharding_source: ['manual']
    manual_config:
      head_dim: 128
      tp_plan:
        # mamba SSM layer
        "in_proj": "mamba"
        "out_proj": "rowwise"
        # attention layer
        "q_proj": "colwise"
        "k_proj": "colwise"
        "v_proj": "colwise"
        "o_proj": "rowwise"
        # moe layer: SHARED experts
        "up_proj": "colwise"
        "down_proj": "rowwise"
  multi_stream_moe:
    stage: compile
    enabled: true
  gather_logits_before_lm_head:
    enabled: true
  fuse_mamba_a_log:
    stage: post_load_fusion
    enabled: true
  insert_cached_ssm_attention:
    backend: flashinfer_ssm
