# Config for SuperV3 with MTP speculative decoding.
#
runtime: trtllm
compile_backend: torch-cudagraph
max_batch_size: 64
max_seq_len: 8192 # tunable
max_num_tokens: 2048
enable_chunked_prefill: false # TODO: Support chunked prefill w/ spec dec
attn_backend: trtllm
model_factory: AutoModelForCausalLM
skip_loading_weights: false
cuda_graph_config:
  max_batch_size: 64
  enable_padding: true
kv_cache_config:
  mamba_ssm_cache_dtype: auto
speculative_config:
  decoding_type: MTP
  num_nextn_predict_layers: 6
  mtp_eagle_one_model: true
transforms:
  compile_model:
    # MTP speculative decoding does not support piecewise CUDA graph capture yet.
    piecewise_enabled: false
  detect_sharding:
    allreduce_strategy: NCCL
    # NOTE: add 'tp' to sharding dims only for high-throughput runs
    # For low-latency, keep mamba and attention replicated
    sharding_dims: ['ep', 'bmm']
    # NOTE: sharding_source applies only to TP sharding
    sharding_source: ['manual']
    manual_config:
      head_dim: 128
      tp_plan:
        # mamba SSM layer
        "in_proj": "mamba"
        "out_proj": "rowwise"
        # attention layer
        "q_proj": "colwise"
        "k_proj": "colwise"
        "v_proj": "colwise"
        "o_proj": "rowwise"
        # moe layer: SHARED experts
        "up_proj": "colwise"
        "down_proj": "rowwise"
        # MoLE: latent projections: simple shard
        "fc1_latent_proj": "gather"
        "fc2_latent_proj": "gather"
  # multi_stream_moe disabled - creates NaNs in target's sampled logits. TODO: investigate + fix
  multi_stream_moe:
    stage: compile
    enabled: false
  fuse_mamba_a_log:
    stage: post_load_fusion
    enabled: true
  # FlashInfer SSM is used for the MTP extend path; Triton causal conv is still required
  # for speculative Mamba state caching in this configuration.
  # NOTE: ssm_replay is disabled because the replay SSM kernel
  # (_persistent_main_kernel in replay_selective_state_update.py) hits an illegal
  # memory access during CUDA-graph capture for bf16 and nvfp4 on Blackwell (fp8 is
  # unaffected). See https://nvbugs/6316981. Re-enable (ssm_replay: true) once the
  # replay kernel is fixed to restore the Mamba state fast-forward optimization.
  # Tracking issue: https://github.com/NVIDIA/TensorRT-LLM/issues/15565
  insert_cached_ssm_attention:
    backend: flashinfer_ssm
    ssm_replay: false
  insert_cached_causal_conv:
    backend: triton_causal_conv
  fuse_nvfp4_moe:
    backend: trtllm_gen
  fuse_fp8_moe:
    allow_different_input_scales: true
