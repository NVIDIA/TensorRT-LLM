# Config for SuperV3 with MTP speculative decoding + attention-DP.
runtime: trtllm
compile_backend: torch-cudagraph
# For low-concurrency / latency-sensitive serving, lower max_batch_size to 16 for better latency.
max_batch_size: 128
max_seq_len: 65536 # tunable
enable_chunked_prefill: false # TODO: Support chunked prefill w/ spec dec
attn_backend: trtllm
model_factory: AutoModelForCausalLM
skip_loading_weights: false
cuda_graph_config:
  batch_sizes: [1, 2, 4, 8, 16, 24, 32, 64, 128]
kv_cache_config:
  mamba_ssm_cache_dtype: auto
speculative_config:
  decoding_type: MTP
  num_nextn_predict_layers: 6
  mtp_eagle_one_model: true
attention_dp_config:
  enable_balance: true
  batching_wait_iters: 10
  timeout_iters: 16
transforms:
  detect_sharding:
    allreduce_strategy: NCCL
    enable_attention_dp: true
    # NOTE: add 'tp' to sharding dims only for high-throughput runs
    # For low-latency, keep mamba and attention replicated
    sharding_dims: ['ep', 'bmm']
    # NOTE: sharding_source applies only to TP sharding
    sharding_source: ['manual']
    manual_config:
      head_dim: 128
      tp_plan:
        # mamba SSM layer
        "in_proj": "mamba"
        "out_proj": "rowwise"
        # attention layer
        "q_proj": "colwise"
        "k_proj": "colwise"
        "v_proj": "colwise"
        "o_proj": "rowwise"
        # moe layer: SHARED experts
        "up_proj": "colwise"
        "down_proj": "rowwise"
        # MoLE: latent projections: simple shard
        "fc1_latent_proj": "gather"
        "fc2_latent_proj": "gather"
  # multi_stream_moe disabled - creates NaNs in target's sampled logits. TODO: investigate + fix
  multi_stream_moe:
    stage: compile
    enabled: false
  fuse_mamba_a_log:
    stage: post_load_fusion
    enabled: true
  # FlashInfer SSM is used for the MTP extend path; Triton causal conv is still required
  # for speculative Mamba state caching in this configuration.
  insert_cached_ssm_attention:
    backend: flashinfer_ssm
    ssm_replay: true
  insert_cached_causal_conv:
    backend: triton_causal_conv
  fuse_nvfp4_moe:
    backend: trtllm_gen
  fuse_fp8_moe:
    allow_different_input_scales: true
