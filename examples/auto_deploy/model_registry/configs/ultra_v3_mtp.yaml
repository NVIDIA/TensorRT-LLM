# Config for Ultra V3 with MTP speculative decoding.
#
max_batch_size: 4
max_seq_len: 12288 # tuned for 0.80 free_gpu_memory_fraction with 8-way TP
enable_chunked_prefill: false # TODO: Support chunked prefill w/ spec dec
cuda_graph_config:
  batch_sizes: [1, 2, 4]
kv_cache_config:
  # tunable mamba cache dtype
  # --> use float32 for accuracy and default (auto) for speed
  mamba_ssm_cache_dtype: float32
  free_gpu_memory_fraction: 0.80
speculative_config:
  decoding_type: MTP
  max_draft_len: 6
  mtp_eagle_one_model: true
transforms:
  detect_sharding:
    allreduce_strategy: SYMM_MEM
    # NOTE: add 'tp' to sharding dims only for high-throughput runs
    # For low-latency, keep mamba and attention replicated
    sharding_dims: ['ep', 'bmm', 'tp']
    # NOTE: sharding_source applies only to TP sharding
    sharding_source: ['manual']
    manual_config:
      head_dim: 128
      tp_plan:
        # mamba SSM layer
        "in_proj": "mamba"
        "out_proj": "rowwise"
        # attention layer
        "q_proj": "colwise"
        "k_proj": "colwise"
        "v_proj": "colwise"
        "o_proj": "rowwise"
        # moe layer: SHARED experts
        "up_proj": "colwise"
        "down_proj": "rowwise"
        # MoLE: latent projections: simple shard
        "fc1_latent_proj": "gather"
        "fc2_latent_proj": "gather"
  multi_stream_moe:
    enabled: true
  gather_logits_before_lm_head:
    # TODO: fix https://github.com/NVIDIA/TensorRT-LLM/issues/9878 to enable by default
    enabled: true
  fuse_mamba_a_log:
    stage: post_load_fusion
    enabled: true
  # Triton causal conv is required for MTP speculative Mamba state caching.
  insert_cached_causal_conv:
    backend: triton_causal_conv
  fuse_fp8_moe:
    allow_different_input_scales: true
  fuse_nvfp4_moe:
    allow_different_input_scales: true
