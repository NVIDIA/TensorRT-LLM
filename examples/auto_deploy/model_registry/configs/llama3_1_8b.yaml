compile_backend: torch-cudagraph
enable_chunked_prefill: true
model_factory: AutoModelForCausalLM
runtime: trtllm
kv_cache_config:
  dtype: fp8
  free_gpu_memory_fraction: 0.9
attn_backend: trtllm
max_batch_size: 256
max_seq_len: 16384
cuda_graph_batch_sizes:
  - 256
  - 240
  - 224
  - 208
  - 192
  - 176
  - 160
  - 144
  - 128
  - 112
  - 96
  - 80
  - 64
  - 48
  - 32
  - 16
  - 8
  - 4
  - 2
  - 1
transforms:
  match_fp8_swiglu_pattern:
    enabled: true
  fuse_trtllm_attn_quant_fp8:
    enabled: true
  fuse_fp8_gemms:
    enabled: true
  fuse_fp8_swiglu:
    enabled: true
  fuse_rmsnorm_quant_fp8:
    enabled: true
