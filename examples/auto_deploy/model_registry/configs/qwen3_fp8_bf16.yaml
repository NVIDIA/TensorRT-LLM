# Qwen3 dense FP8 checkpoints can hit NVRTC failures in the finegrained FP8
# linear path. Match the MiniMax-M2 workaround by forcing BF16 weights and
# avoiding the finegrained FP8 fusion transforms for the registry smoke test.
transforms:
  match_finegrained_fp8_swiglu_pattern:
    enabled: false
  fuse_finegrained_fp8_linear:
    enabled: false
  fuse_finegrained_fp8_moe:
    enabled: false
  fuse_finegrained_fp8_swiglu:
    enabled: false
model_kwargs:
  torch_dtype: bfloat16
