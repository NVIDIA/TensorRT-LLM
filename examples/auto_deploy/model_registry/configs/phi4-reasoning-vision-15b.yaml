model_factory: AutoModelForCausalLM
model_kwargs:
  attn_implementation: eager

trust_remote_code: true
skip_tokenizer_init: false

max_batch_size: 1
max_seq_len: 4096
max_num_tokens: 4096
enable_chunked_prefill: false

kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.7
