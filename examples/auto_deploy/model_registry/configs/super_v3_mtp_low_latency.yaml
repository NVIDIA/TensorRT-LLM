# Config for SuperV3 with MTP speculative decoding + attention-DP, tuned
# for LOW LATENCY (per-user TPOT) at small concurrency.
#
# Diff from ``super_v3_mtp.yaml``:
# - ``max_batch_size`` lowered (16 vs 128). Less mamba/KV cache pressure
#   and only small captured graphs are exercised.
# - ``cuda_graph_batch_sizes`` trimmed to the latency-relevant range
#   (drop 24, 32, 64, 128). Every captured graph costs warmup time and
#   GPU memory; if you'll never serve c>16, capturing larger sizes is
#   wasted.
# - Everything else (ADP, sharding, MoE fusion) matches the throughput
#   yaml so the MoE alltoall + tight-slice optimization still applies.
#
# Pair this with serving at low concurrency (c=1..16). For higher c, use
# ``super_v3_mtp.yaml`` and accept the higher TPOT.
runtime: trtllm
compile_backend: torch-cudagraph
max_batch_size: 16
max_seq_len: 65536 # tunable
enable_chunked_prefill: false # TODO: Support chunked prefill w/ spec dec
attn_backend: trtllm
model_factory: AutoModelForCausalLM
skip_loading_weights: false
cuda_graph_config:
  batch_sizes: [1, 2, 4, 8, 16]
kv_cache_config:
  # tunable mamba cache dtype
  # --> use float32 for accuracy and default (auto) for speed
  mamba_ssm_cache_dtype: auto
speculative_config:
  decoding_type: MTP
  num_nextn_predict_layers: 6
  mtp_eagle_one_model: true
transforms:
  detect_sharding:
    allreduce_strategy: NCCL
    enable_attention_dp: true
    # Mamba + attention stay replicated (no 'tp') so a single user's
    # forward never pays a tp-allreduce. This is the right call only for
    # low concurrency where the per-rank compute is the limiter, not the
    # comm. For high-throughput, add 'tp' so attention/mamba scale.
    sharding_dims: ['ep', 'bmm']
    sharding_source: ['manual']
    manual_config:
      head_dim: 128
      tp_plan:
        # mamba SSM layer
        "in_proj": "mamba"
        "out_proj": "rowwise"
        # attention layer
        "q_proj": "colwise"
        "k_proj": "colwise"
        "v_proj": "colwise"
        "o_proj": "rowwise"
        # moe layer: SHARED experts
        "up_proj": "colwise"
        "down_proj": "rowwise"
        # MoLE: latent projections: simple shard
        "fc1_latent_proj": "gather"
        "fc2_latent_proj": "gather"
  # multi_stream_moe disabled - creates NaNs in target's sampled logits. TODO: investigate + fix
  multi_stream_moe:
    stage: compile
    enabled: false
  fuse_mamba_a_log:
    stage: post_load_fusion
    enabled: true
  # Triton SSM + causal conv are required for MTP as currently they are the only backends
  # that support speculative mamba state caching.
  insert_cached_ssm_attention:
    backend: triton_ssm
  insert_cached_causal_conv:
    backend: triton_causal_conv
  fuse_nvfp4_moe:
    backend: trtllm_gen
  fuse_fp8_moe:
    allow_different_input_scales: true
