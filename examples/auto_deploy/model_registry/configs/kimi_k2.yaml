# Configuration for Kimi-K2.5 VLM (moonshotai/Kimi-K2.5)
max_seq_len: 4096
max_num_tokens: 4096
max_batch_size: 64
enable_chunked_prefill: true
cuda_graph_config:
  batch_sizes: [1, 2, 4, 8, 16, 32, 64]
kv_cache_config:
  dtype: bfloat16
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.7
  tokens_per_block: 64
