# Override MLA attention backend to trtllm_mla.
# Append to yaml_extra AFTER dashboard_default.yaml to override the default flashinfer_mla backend.
transforms:
  insert_cached_mla_attention:
    backend: trtllm_mla
  fuse_rope_into_trtllm_mla:
    # Disable fused RoPE: the mla_rope_generation kernel currently has a
    # decode-phase accuracy issue; use the non-fused Python RoPE path until
    # fixed. The prefill path uses the C++ FMHA kernel (no SDPA).
    enabled: false
