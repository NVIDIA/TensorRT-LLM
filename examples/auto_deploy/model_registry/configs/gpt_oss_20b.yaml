# OpenAI GPT-OSS-20B (32 experts, top-4, MXFP4 quantized) — standalone AD serving config.
# 24 layers (alternating sliding/full), GQA (64 Q / 8 KV heads), head_dim=64, hidden=2880.
# Weights are stored in MXFP4 on HF; AD's quantize_mxfp4_moe transform handles it.
runtime: trtllm
model_factory: AutoModelForCausalLM
attn_backend: trtllm
compile_backend: torch-cudagraph
skip_loading_weights: false
world_size: 1
max_batch_size: 128
max_seq_len: 4096
max_num_tokens: 8192
enable_chunked_prefill: true
cuda_graph_config:
  batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128]
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.8
transforms:
  # Fold RoPE into the trtllm attention kernel call so the kernel applies
  # RoPE internally (same path as the PyTorch backend). When RoPE is applied
  # externally in modeling code and only Q/K post-RoPE are passed to the
  # kernel, small precision differences in cos/sin compound through the KV
  # cache and produce large divergence at decode steps. Verified via 4-layer
  # PT-vs-AD per-step dump: enabling this transform reduces L0 attn_out
  # decode_1 rel_RMSE from ~129% to ~1%.
  fuse_rope_into_trtllm_attention:
    enabled: true
