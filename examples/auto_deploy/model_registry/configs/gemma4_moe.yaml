# Gemma 4 MoE (26B total, 4B activated) — text-only AD export path.
# Uses triton paged attention backend: supports head_dim=512 (global_head_dim),
# paged KV cache, CUDA-graph-compatible, FlashDecoding for decode.
model_factory: Gemma4ForConditionalGeneration
tokenizer: google/gemma-4-26B-A4B-it
attn_backend: triton_paged
compile_backend: torch-cudagraph
cuda_graph_config:
  batch_sizes: [1, 2, 4, 8, 16, 32, 64, 128, 256, 512]
max_num_tokens: 8192
max_batch_size: 512
max_seq_len: 8192
enable_chunked_prefill: true
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.4
transforms:
  compile_model:
    # Gemma4's inner text graph has 8 leading request-dependent inputs; if
    # fewer are marked batched, CUDA graph capture treats dynamic tensors as static.
    num_batched_inputs: 8
    # Gemma4 image batches carry variable-length multimodal span tensors.
    # Piecewise CUDA graph currently sizes those buffers from text-only warmup.
    piecewise_enabled: false
  mlir_elementwise_fusion:
    enabled: true
  gather_logits_before_lm_head:
    enabled: true
  fuse_gemms:
    enabled: true
  #TODO(suyogg): Enable when https://github.com/NVIDIA/TensorRT-LLM/issues/12954 is resolved
  multi_stream_moe:
    enabled: false
