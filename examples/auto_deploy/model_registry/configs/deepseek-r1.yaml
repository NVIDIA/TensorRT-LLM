runtime: trtllm
compile_backend: torch-cudagraph
max_batch_size: 256
max_seq_len: 8192
max_num_tokens: 15360
enable_chunked_prefill: true
# Opt into FP8 KV cache for ~2x capacity; default ("auto") keeps bf16.
kv_cache_config:
  dtype: fp8
  tokens_per_block: 32
  free_gpu_memory_fraction: 0.7
cuda_graph_config:
  # Override dashboard_default.yaml's max_batch_size=8 so batch_sizes up to 256 are captured.
  max_batch_size: 256
  batch_sizes: [1, 2, 4, 8, 16, 32, 64, 80, 96, 112, 128, 192, 208, 224, 240, 256]
transforms:
  fuse_gemms_mixed_children:
    enabled: false
  mlir_elementwise_fusion:
    enabled: true
  match_swiglu_pattern:
    enabled: true
  match_nvfp4_swiglu_pattern:
    enabled: true
  fuse_nvfp4_moe:
    allow_different_input_scales: true
  fuse_nvfp4_swiglu:
    enabled: true
  fuse_swiglu:
    enabled: true
  multi_stream_moe:
    enabled: true
  insert_cached_mla_attention:
    backend: trtllm_mla
  fuse_rope_into_trtllm_mla:
    enabled: true
  # Generic fuse_gemms merges the MLA q_a + kv_a_with_mqa projections into a
  # 2112x7168 bf16 GEMM; torch_linear_simple then dispatches that exact shape
  # to the trtllm dsv3 min-latency kernel (op-level, no extra transform).
  fuse_gemms:
    enabled: true

  multi_stream_mla_attn:
    enabled: true
  fuse_allreduce_residual_rmsnorm:
    enabled: true
  fuse_add_rms_norm:
    enabled: true
  fuse_moe_allreduce_residual_rmsnorm:
    enabled: true
  detect_sharding:
    enabled: false
  sharding_transform_executor:
    enabled: false
  apply_sharding_hints:
    enabled: true
    allreduce_strategy: SYMM_MEM
    # shard_layers whitelist: the shared expert (layer_type="shared_expert") is
    # NOT listed, so it stays REPLICATED. TP-sharding it corrupts NVFP4
    # deswizzled weight scales (~2.5pt GSM8K loss). Required for accuracy.
    shard_layers:
    - mla
    - moe
    - mlp
  cleanup_identity_dtype_cast:
    enabled: true
  gather_logits_before_lm_head:
    enabled: true
  compile_model:
    piecewise_enabled: true
    piecewise_num_tokens: [256, 512, 1024, 2048, 3072, 4096, 5120, 6144, 8192]
