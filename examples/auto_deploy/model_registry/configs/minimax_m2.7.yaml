# MiniMax-M2.7 (256 experts, top-8, FP8 quantized).
tokenizer: MiniMaxAI/MiniMax-M2.7
attn_backend: flashinfer
max_seq_len: 8192
max_num_tokens: 8192
max_batch_size: 8
enable_chunked_prefill: true
cuda_graph_config:
  max_batch_size: 8
kv_cache_config:
  enable_block_reuse: false
  free_gpu_memory_fraction: 0.8
transforms:
  fuse_trtllm_attn_quant_fp8:
    # MiniMax-M2.7 uses FlashInfer attention; the TRTLLM-attention FP8 output
    # quantization pass is not applicable.
    enabled: false
  fuse_rmsnorm_quant_fp8:
    stage: post_load_fusion
    enabled: true
  gather_logits_before_lm_head:
    enabled: true
  fuse_gemms:
    enabled: true
  multi_stream_moe:
    enabled: false
  compile_model:
    piecewise_enabled: true
