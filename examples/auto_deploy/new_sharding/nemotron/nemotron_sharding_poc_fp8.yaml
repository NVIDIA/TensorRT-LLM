model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-FP8
args:
  world_size: 2
  runtime: trtllm
  compile_backend: torch-cudagraph
  max_batch_size: 384
  max_seq_len: 65536 # tunable
  enable_chunked_prefill: true
  attn_backend: trtllm
  model_factory: AutoModelForCausalLM
  skip_loading_weights: false
  cuda_graph_batch_sizes: [1, 2, 4, 8, 16, 24, 32, 64, 128, 256, 320, 384]
  kv_cache_config:
    free_gpu_memory_fraction: 0.88
    # tunable mamba cache dtype
    # --> use float32 for accuracy and default (auto) for speed
    mamba_ssm_cache_dtype: auto
  transforms:
    detect_sharding:
      stage: sharding
      enabled: false
    sharding_transform_executor:
      stage: sharding
      enabled: false
    apply_sharding_hints:
      stage: sharding
      enabled: true
      run_shape_prop: true
      allreduce_strategy: NCCL
    multi_stream_moe:
      stage: compile
      enabled: true
    gather_logits_before_lm_head:
      # TODO: fix https://github.com/NVIDIA/TensorRT-LLM/issues/9878 to enable by default
      enabled: true
    fuse_mamba_a_log:
      stage: post_load_fusion
      enabled: true
    insert_cached_ssm_attention:
      backend: flashinfer_ssm
