# SLURM Configuration
slurm:
  script_file: "aggregated_torch.slurm"
  partition: "<partition>"
  account: "<account>"
  job_time: "5:00:00"
  job_name: "<job_name>"
  extra_args: "" # Cluster specific arguments, e.g. "--gres=gpu:4 --exclude=node1,node2"
  set_segment: true # Optional: whether to set the segment for the job
  numa_bind: true # Only enable for GB200/GB300 NVL72

# Benchmark Configuration
benchmark:
  input_length: 4096 # Input sequence length
  output_length: 65536 # Output sequence length
  num_prompts: 1024
  max_concurrency: 256
  streaming: true # Enable streaming mode
  dataset_name: "<dataset_file>"

# Hardware Configuration
hardware:
  gpus_per_node: 4 # Modify this with your hardware configuration

# Server Configuration
server:
  model_path: "<path_to_model>"
  tp_size: 8 # Tensor-parallel-size
  ep_size: 8 # Expert-parallel-size
  pp_size: 1 # Pipeline-parallel-size
  max_batch_size: 512
  max_num_tokens: 8192
  backend: "pytorch"
  trust_remote_code: true
  port: 8000
  extra_llm_api_options: "extra_llm_api_options.yaml"

# Environment Configuration
environment:
  container_mount: "<container_mount>" # Format: path1:path1,path2:path2
  container_image: "<enroot_file_path>"
  trtllm_repo: "<trtllm_repo>"
  build_wheel: false # False will use already exist .whl in trtllm_wheel_path
  cuda_architectures: "100-real"
  trtllm_wheel_path: ""
  work_dir: "<full_path_to_work_dir>"
  worker_env_var: "TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=1 TRTLLM_WORKER_DISABLE_GC=1 TRTLLM_ENABLE_PDL=1 ENROOT_ALLOW_DEV=yes NCCL_GRAPH_MIXING_SUPPORT=0 HF_HUB_OFFLINE=1 HF_HOME=/tmp/hf_home FLASHINFER_WORKSPACE_BASE=/tmp PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True"

# Profiling Configuration
profiling:
  nsys_on: false # Set to true to enable Nsight Systems profiling of the server workers
  profile_range: "10-30" # Set TLLM_PROFILE_START_STOP for server workers (iteration range)
