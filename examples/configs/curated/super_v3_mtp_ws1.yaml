# Nemotron-3-Super with MTP speculative decoding, WS=1 (single GPU).
max_batch_size: 64
max_seq_len: 8192
max_num_tokens: 2048
tensor_parallel_size: 1
moe_expert_parallel_size: 1
trust_remote_code: true
enable_chunked_prefill: false
cuda_graph_config:
  enable_padding: true
  max_batch_size: 64
kv_cache_config:
  enable_block_reuse: false
  mamba_ssm_cache_dtype: auto
num_postprocess_workers: 4
speculative_config:
  decoding_type: MTP
  num_nextn_predict_layers: 6
