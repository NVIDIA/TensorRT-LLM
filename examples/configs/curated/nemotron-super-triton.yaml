# W4A16 NVFP4 dequant-fallback baseline for Nemotron-3-Super-120B-A12B-NVFP4.
# Identical serving params to nemotron-super-marlin.yaml so the ONLY difference
# is the MoE backend: this config omits the Marlin override and uses the default
# W4A16 NVFP4 dequant fallback on Hopper (SM90). Use as the A/B baseline when
# benchmarking the Marlin backend.
max_batch_size: 8
max_seq_len: 66048

tensor_parallel_size: 2
pipeline_parallel_size: 1
moe_expert_parallel_size: 2
context_parallel_size: 1
