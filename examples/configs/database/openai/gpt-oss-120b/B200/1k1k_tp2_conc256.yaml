max_batch_size: 512
cuda_graph_config:
  enable_padding: true
  max_batch_size: 256
enable_attention_dp: true
print_iter_log: true
kv_cache_config:
  dtype: fp8
  free_gpu_memory_fraction: 0.85
stream_interval: 20
moe_config:
  backend: TRTLLM
attention_dp_config:
  batching_wait_iters: 10
  enable_balance: true
  timeout_iters: 50
tensor_parallel_size: 2
moe_expert_parallel_size: 2
trust_remote_code: true
max_num_tokens: 20000
max_seq_len: 2304
