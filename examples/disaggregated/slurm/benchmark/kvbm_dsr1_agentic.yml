# SLURM Configuration
slurm:
  script_file: "disaggr_torch.slurm"
  partition: "gb200"
  account: "coreai_comparch_trtllm"
  job_time: "00:30:00"
  job_name: "coreai_comparch_trtllm-lizhiz.bench"
  numa_bind: true # Only enable for GB200 NVL72

# Benchmark Mode
benchmark:
  mode: "e2e"  # Options: e2e, gen_only
  use_nv_sa_benchmark: false
  use_aiperf: true
  multi_round: 10  # Number of benchmark rounds
  benchmark_ratio: 1  # Benchmark ratio
  streaming: true  # Enable streaming mode
  concurrency_list: "512"
  input_length: 1024
  output_length: 1024
  dataset_file: "/lustre/fsw/coreai_comparch_trtllm/lizhiz/trtllm_2/agentic_data/dataset_sample2000.jsonl"

# Hardware Configuration
hardware:
  gpus_per_node: 4  # Modify this with your hardware configuration
  num_ctx_servers: 1  # Number of context servers
  num_gen_servers: 1  # Number of generation servers

# Environment Configuration
environment:
  container_mount: "/lustre/fsw:/lustre/fsw,/lustre/share:/lustre/share"  # Format: path1:path1,path2:path2
  container_image: "/lustre/fsw/coreai_comparch_trtllm/lizhiz/trtllm_2/build_images/bec4eebd7/trtllm.sqsh"
  model_path: "/lustre/share/coreai_dlfw_dev/jullin/deepseek-ai/DeepSeek-R1-0528"
  trtllm_repo: "/lustre/fsw/coreai_comparch_trtllm/lizhiz/trtllm_2"
  build_wheel: false
  trtllm_wheel_path: ""
  work_dir: "/lustre/fsw/coreai_comparch_trtllm/lizhiz/trtllm_2/examples/disaggregated/slurm/benchmark"
  worker_env_var: "TLLM_LOG_LEVEL=INFO TRTLLM_SERVER_DISABLE_GC=0 TRTLLM_WORKER_DISABLE_GC=0 TLLM_NUMA_AWARE_WORKER_AFFINITY=0 UCX_CUDA_IPC_ENABLE_MNNVL=n TLLM_LLM_ENABLE_DEBUG=0 DYN_KVBM_CPU_CACHE_GB=80"
  server_env_var: ""

# Profiling Configuration
profiling:
  nsys_on: false  # Set to true to enable profiling

# Service Discovery Configuration
service_discovery:
  backend: "etcd"

# KVBM Configuration
kvbm:
  enabled: true
  package: "kvbm"

# Accuracy Configuration
accuracy:
  enable_accuracy_test: false

worker_config:
  gen:
    tensor_parallel_size: 16
    moe_expert_parallel_size: 16
    enable_attention_dp: true
    enable_lm_head_tp_in_adp: false
    pipeline_parallel_size: 1
    max_batch_size: 1024
    max_num_tokens: 1024
    max_seq_len: 65536
    cuda_graph_config:
      enable_padding: true
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
      - 512
      - 1024
    print_iter_log: true
    kv_cache_config:
      enable_block_reuse: true
      free_gpu_memory_fraction: 0.75
      dtype: fp8
      host_cache_size: 85899345920  # 80GB host cache for KV offloading
      secondary_offload_min_priority: 0
    moe_config:
      backend: TRTLLM
      use_low_precision_moe_combine: true
    cache_transceiver_config:
      max_tokens_in_buffer: 16384
      backend: UCX
    stream_interval: 100
    num_postprocess_workers: 4
  ctx:
    max_batch_size: 16
    max_num_tokens: 16384
    max_seq_len: 65536
    tensor_parallel_size: 8
    moe_expert_parallel_size: 8
    enable_attention_dp: true
    pipeline_parallel_size: 1
    print_iter_log: true
    cuda_graph_config: null
    disable_overlap_scheduler: true
    moe_config:
      backend: DEEPGEMM
    kv_cache_config:
      enable_block_reuse: true
      free_gpu_memory_fraction: 0.3
      dtype: fp8
    cache_transceiver_config:
      max_tokens_in_buffer: 16384
      backend: UCX
