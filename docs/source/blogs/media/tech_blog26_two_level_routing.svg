<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="750" viewBox="0 100 1800 750" role="img" aria-labelledby="title desc">
  <title id="title">Two-level routing for context locality in disaggregated serving</title>
  <desc id="desc">An agentic request enters the TensorRT LLM disaggregated front-end. Instance-level routing first selects a context server, then the selected server's attention data-parallel router performs rank-level routing. Each level can use conversation-aware affinity or KV-cache-aware scoring. Full conversation-prefix reuse requires a later turn to return to both the context server and the rank that hold the corresponding KV blocks. The selected context rank transfers KV cache to a generation server, which decodes and streams the response.</desc>

  <defs>
    <style>
      .eyebrow { font: 700 15px "NVIDIA Sans", Arial, sans-serif; letter-spacing: 1.2px; }
      .server-title { font: 700 25px "NVIDIA Sans", Arial, sans-serif; fill: #111827; }
      .card-title { font: 700 19px "NVIDIA Sans", Arial, sans-serif; fill: #111827; }
      .body { font: 400 16px "NVIDIA Sans", Arial, sans-serif; fill: #475569; }
      .small { font: 400 14px "NVIDIA Sans", Arial, sans-serif; fill: #475569; }
      .pill { font: 700 14px "NVIDIA Sans", Arial, sans-serif; letter-spacing: 0.4px; }
      .flow-label { font: 600 15px "NVIDIA Sans", Arial, sans-serif; fill: #334155; }
      .miss-label { font: 700 14px "NVIDIA Sans", Arial, sans-serif; fill: #be123c; }
    </style>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>

    <marker id="arrowGray" markerWidth="14" markerHeight="14" refX="12.5" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="12.5" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#65a30d"/>
    </marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12.5" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="12.5" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#e11d48"/>
    </marker>
  </defs>

  <rect width="1800" height="940" fill="#ffffff"/>

  <!-- Client -->
  <rect x="50" y="260" width="250" height="250" rx="16" fill="#f7fee7" stroke="#76b900" stroke-width="2" filter="url(#shadow)"/>
  <rect x="75" y="282" width="126" height="30" rx="15" fill="#d9f99d"/>
  <text x="138" y="302" text-anchor="middle" class="eyebrow" fill="#365314">AGENT CLIENT</text>
  <text x="75" y="350" class="server-title">Next turn</text>
  <rect x="75" y="375" width="200" height="32" rx="8" fill="#ffffff" stroke="#bef264"/>
  <text x="91" y="397" class="body">Conversation ID</text>
  <rect x="75" y="416" width="200" height="32" rx="8" fill="#ffffff" stroke="#bef264"/>
  <text x="91" y="438" class="body">Accumulated prompt</text>
  <rect x="75" y="457" width="200" height="32" rx="8" fill="#ffffff" stroke="#bef264"/>
  <text x="91" y="479" class="body">Cache salt (optional)</text>

  <!-- Client to orchestrator -->
  <path d="M 300 375 L 376 375" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrowGray)"/>
  <text x="332" y="357" text-anchor="middle" class="flow-label">request</text>

  <!-- Level 1: front-end orchestrator -->
  <rect x="380" y="125" width="450" height="540" rx="18" fill="#eff6ff" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <rect x="410" y="150" width="248" height="32" rx="16" fill="#dbeafe"/>
  <text x="534" y="171" text-anchor="middle" class="eyebrow" fill="#1e3a8a">TRTLLM-SERVE DISAGGREGATED</text>
  <text x="410" y="220" class="server-title">Front-end orchestrator</text>
  <rect x="410" y="242" width="390" height="34" rx="9" fill="#0369a1"/>
  <text x="605" y="265" text-anchor="middle" class="eyebrow" fill="#ffffff">LEVEL 1 · INSTANCE-LEVEL ROUTING</text>
  <text x="410" y="306" class="small">Use either routing policy to select a context server</text>

  <rect x="410" y="326" width="390" height="112" rx="12" fill="#ffffff" stroke="#76b900" stroke-width="2"/>
  <rect x="430" y="345" width="176" height="28" rx="14" fill="#ecfccb"/>
  <text x="518" y="364" text-anchor="middle" class="pill" fill="#365314">CONVERSATION-AWARE</text>
  <text x="430" y="397" class="card-title">Conversation ID → CTX server</text>
  <text x="430" y="422" class="small">Least-loaded first placement, then explicit affinity</text>

  <rect x="410" y="460" width="390" height="126" rx="12" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
  <rect x="430" y="479" width="170" height="28" rx="14" fill="#e0f2fe"/>
  <text x="515" y="498" text-anchor="middle" class="pill" fill="#075985">KV-CACHE-AWARE</text>
  <text x="430" y="531" class="card-title">Prompt blocks → cache view</text>
  <text x="430" y="556" class="small">Matched blocks plus active-request load</text>
  <text x="430" y="578" class="small">Content-derived affinity protects later turns</text>

  <rect x="460" y="610" width="290" height="34" rx="17" fill="#ecfccb" stroke="#76b900"/>
  <text x="605" y="633" text-anchor="middle" class="flow-label" fill="#365314">Selected destination: CTX server 1</text>

  <!-- Context tier -->
  <rect x="890" y="110" width="640" height="650" rx="18" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <rect x="920" y="132" width="198" height="32" rx="16" fill="#e2e8f0"/>
  <text x="1019" y="153" text-anchor="middle" class="eyebrow" fill="#334155">CONTEXT (CTX) TIER</text>

  <!-- Alternative context servers -->
  <rect x="940" y="180" width="250" height="64" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1065" y="207" text-anchor="middle" class="card-title" fill="#64748b">CTX server 0</text>
  <text x="1065" y="229" text-anchor="middle" class="small">other rank-local caches</text>
  <rect x="1230" y="180" width="250" height="64" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1355" y="207" text-anchor="middle" class="card-title" fill="#64748b">CTX server 2</text>
  <text x="1355" y="229" text-anchor="middle" class="small">other rank-local caches</text>

  <!-- Selected context server -->
  <rect x="940" y="275" width="540" height="455" rx="16" fill="#ffffff" stroke="#76b900" stroke-width="3" filter="url(#shadow)"/>
  <rect x="965" y="296" width="130" height="28" rx="14" fill="#d9f99d"/>
  <text x="1030" y="315" text-anchor="middle" class="pill" fill="#365314">SELECTED</text>
  <text x="1115" y="317" class="card-title">CTX server 1</text>

  <!-- Level 2: ADP router -->
  <rect x="970" y="345" width="480" height="238" rx="14" fill="#eff6ff" stroke="#38bdf8" stroke-width="2"/>
  <text x="995" y="378" class="card-title">Attention data-parallel router</text>
  <rect x="995" y="394" width="430" height="30" rx="8" fill="#0369a1"/>
  <text x="1210" y="415" text-anchor="middle" class="eyebrow" fill="#ffffff">LEVEL 2 · RANK-LEVEL ROUTING</text>
  <text x="995" y="448" class="small">Again, use either routing policy inside the selected server</text>

  <rect x="995" y="463" width="198" height="96" rx="10" fill="#ffffff" stroke="#76b900" stroke-width="1.8"/>
  <text x="1010" y="488" class="pill" fill="#365314">CONVERSATION-AWARE</text>
  <text x="1010" y="517" class="small">Conversation ID → rank</text>
  <text x="1010" y="540" class="small">First turn: round-robin</text>

  <rect x="1207" y="463" width="218" height="96" rx="10" fill="#ffffff" stroke="#38bdf8" stroke-width="1.8"/>
  <text x="1222" y="488" class="pill" fill="#075985">KV-CACHE-AWARE</text>
  <text x="1222" y="517" class="small">Rank-local prefix probe</text>
  <text x="1222" y="540" class="small">Post-reuse work plus load</text>

  <!-- Rank selection -->
  <path d="M 1210 583 L 1210 607" fill="none" stroke="#65a30d" stroke-width="3"/>
  <path d="M 1210 607 L 1141 607 L 1141 626" fill="none" stroke="#65a30d" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <path d="M 1210 607 L 1394 607 L 1394 626" fill="none" stroke="#e11d48" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrowRed)"/>
  <text x="1300" y="601" text-anchor="middle" class="miss-label">rank-local reuse lost</text>

  <rect x="975" y="630" width="96" height="70" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1023" y="659" text-anchor="middle" class="card-title" fill="#64748b">Rank 0</text>
  <text x="1023" y="682" text-anchor="middle" class="small">KV cache</text>

  <rect x="1086" y="630" width="110" height="70" rx="10" fill="#f7fee7" stroke="#76b900" stroke-width="3"/>
  <text x="1141" y="657" text-anchor="middle" class="card-title">Rank 1</text>
  <rect x="1099" y="667" width="84" height="24" rx="6" fill="#d9f99d"/>
  <text x="1141" y="684" text-anchor="middle" class="small" fill="#365314">prefix KV</text>

  <rect x="1211" y="630" width="96" height="70" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1259" y="659" text-anchor="middle" class="card-title" fill="#64748b">Rank 2</text>
  <text x="1259" y="682" text-anchor="middle" class="small">KV cache</text>

  <rect x="1319" y="630" width="96" height="70" rx="10" fill="#fff1f2" stroke="#fda4af"/>
  <text x="1367" y="659" text-anchor="middle" class="card-title" fill="#64748b">Rank 3</text>
  <text x="1367" y="682" text-anchor="middle" class="small">KV cache</text>

  <!-- Level 1 selected and miss paths -->
  <path d="M 830 625 C 865 625, 875 350, 936 350" fill="none" stroke="#65a30d" stroke-width="3.5" marker-end="url(#arrowGreen)"/>
  <text x="856" y="530" class="flow-label" fill="#365314">same server</text>
  <path d="M 830 475 C 870 475, 875 212, 936 212" fill="none" stroke="#e11d48" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#arrowRed)"/>
  <text x="842" y="340" class="miss-label">server-local</text>
  <text x="858" y="360" class="miss-label">reuse lost</text>

  <!-- Generation server and CTX-to-GEN KV transfer -->
  <rect x="1570" y="300" width="190" height="280" rx="16" fill="#eff6ff" stroke="#0284c7" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1592" y="322" width="146" height="30" rx="15" fill="#dbeafe"/>
  <text x="1665" y="342" text-anchor="middle" class="eyebrow" fill="#1e3a8a">GEN SERVER</text>
  <text x="1594" y="390" class="card-title">Generation</text>
  <rect x="1594" y="414" width="142" height="38" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="1665" y="439" text-anchor="middle" class="body">Receive KV cache</text>
  <rect x="1594" y="465" width="142" height="38" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="1665" y="490" text-anchor="middle" class="body">Continue decode</text>
  <rect x="1594" y="516" width="142" height="38" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="1665" y="541" text-anchor="middle" class="body">Stream response</text>

  <path d="M 1141 708 L 1141 745 L 1545 745 L 1545 440 L 1566 440" fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#arrowBlue)"/>
  <text x="1518" y="728" text-anchor="end" class="flow-label" fill="#1e40af">CTX → GEN KV transfer</text>

  <!-- Response returns to the client -->
  <path d="M 1665 580 L 1665 810 L 175 810 L 175 514" fill="none" stroke="#64748b" stroke-width="3" marker-end="url(#arrowGray)"/>
  <text x="1640" y="834" text-anchor="end" class="flow-label">streamed response</text>
</svg>
