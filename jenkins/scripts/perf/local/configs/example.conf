# Example config for run_disagg.sh — copy and tweak per cluster / test case.
#
# Loaded by run_disagg.sh via `source`. Plain bash key=value works. Any variable
# not set here falls back to the default defined inside run_disagg.sh. Anything
# explicitly exported in the shell before invoking the script takes precedence
# over this file.

# Path to your TensorRT-LLM checkout (login-node view)
trtllm="{YOUR_TENSORRT_LLM_PATH}"

# Work directory (one per run; will be created)
work_dir="$HOME/perf_runs/disagg_$(date +%Y%m%d_%H%M%S)"

# SLURM
partition="{YOUR_SLURM_PARTITION}"
account="{YOUR_SLURM_ACCOUNT}"
job_name="disagg_test"
time_limit="02:00:00"

# Docker image variable name in jenkins/current_image_tags.properties.
#   LLM_DOCKER_IMAGE       — x86 (H100/B200)
#   LLM_SBSA_DOCKER_IMAGE  — SBSA (GB200)
image_var="LLM_DOCKER_IMAGE"

# Container bind-mounts (comma-separated host:container pairs)
mounts="/lustre:/lustre,/home:/home"

# Path to model weights (must be reachable inside the container via 'mounts')
llm_models_path="/path/to/models"

# Test ID. Format:
#   perf/test_perf_sanity.py::test_e2e[disagg-e2e-<yaml-stem>]
# The <yaml-stem> matches a file in tests/scripts/perf-sanity/disaggregated/
test_id="perf/test_perf_sanity.py::test_e2e[disagg-e2e-CHANGE_ME]"

# Install mode: 'wheel' (pip install <wheel-path>) or 'source' (pip install -e .)
install_mode="wheel"

# Local wheel file (required when install_mode=wheel).
# Path must be inside a directory listed in 'mounts' above (1:1 mounts mean
# same path inside the container). Recommended: $HOME/wheels/ or /lustre/<user>/wheels/.
wheel_path="$HOME/wheels/tensorrt_llm.whl"

# Optional flags — uncomment to enable
# build_wheel_flag="--build-wheel"
# capture_nsys_flag="--capture-nsys"
