# Example config for run_disagg.sh — copy and tweak per cluster / test case.
#
# Loaded by run_disagg.sh via `source`. Plain bash key=value works. Any variable
# not set here falls back to the default defined inside run_disagg.sh. Anything
# explicitly exported in the shell before invoking the script takes precedence
# over this file.

# Path to your TensorRT-LLM checkout (login-node view)
trtllm="${YOUR_TENSORRT_LLM_PATH:-/path/to/tensorrt-llm}"

# Work directory (one per run; will be created).
# Kept under $trtllm so a single mount of the source tree covers it.
work_dir="$trtllm/perf_runs/disagg_$(date +%Y%m%d_%H%M%S)"

# SLURM
partition="${YOUR_SLURM_PARTITION:-your_partition}"
account="${YOUR_SLURM_ACCOUNT:-your_account}"
job_name="disagg_test"
time_limit="04:00:00"

# Docker image — pick ONE of two modes. The script supports both; the rule is:
#
#   ┌──────────────────────┬──────────────────────┬────────────────────────────┐
#   │ image                │ image_var            │ Result                     │
#   ├──────────────────────┼──────────────────────┼────────────────────────────┤
#   │ non-empty (mode a)   │ ANY (ignored)        │ image used verbatim        │
#   │ empty / unset (mode b)│ used as a key name   │ resolve from properties    │
#   └──────────────────────┴──────────────────────┴────────────────────────────┘
#
# Mode (a) — pin a specific image URL. Reproducible, recommended:
image="urm.nvidia.com/sw-tensorrt-docker/tensorrt-llm:pytorch-26.02-py3-x86_64-ubuntu24.04-trt10.15.1.29-skip-tritondevel-202605060827-13616"
#
# Mode (b) — auto-resolve the "current" image from
# jenkins/current_image_tags.properties (CI-updated file) by KEY NAME. To enable
# this, comment out the 'image=' line above (or set it to "") so it's empty.
#   LLM_DOCKER_IMAGE       — x86 (H100/B200)              ← default of image_var
#   LLM_SBSA_DOCKER_IMAGE  — SBSA (GB200)                 ← only override for SBSA
# image_var="LLM_DOCKER_IMAGE"
#
# NOTE: do NOT set both 'image' and 'image_var' expecting them to combine —
# image always wins when set. The current_image_tags.properties file is only
# consulted in mode (b).

# Path to model weights (must be reachable inside the container via 'mounts')
llm_models_path="${YOUR_LLM_MODELS_PATH:-/path/to/llm_models}"

# Container bind-mounts (comma-separated host:container pairs).
# IMPORTANT: every path the container needs at runtime — including $trtllm
# (source + run scripts + wheel), $work_dir (cwd inside container), and
# $llm_models_path — must be reachable through one of these mounts. With
# $work_dir kept under $trtllm and $wheel_path under $trtllm/build, mounting
# $trtllm alone is enough for the test code paths, plus a second mount for
# the model weights.
mounts="$trtllm:$trtllm,$llm_models_path:$llm_models_path"

# Test ID(s). Format:
#   perf/test_perf_sanity.py::test_e2e[disagg-<mode>-<yaml-stem>]
# The <yaml-stem> matches a file in tests/scripts/perf-sanity/disaggregated/.
# <mode> is e2e | gen_only | ctx_only.
#
# Two ways to declare tests — use ONE of these:
#
# (a) Single test (legacy):
# test_id="perf/test_perf_sanity.py::test_e2e[disagg-gen_only-b200_deepseek-r1-fp4_1k1k_con1_ctx1_dep4_gen1_tep8_eplb0_mtp3_ccb-NIXL]"
#
# (b) Multiple tests — bash array. Each entry is submitted as its own SLURM job
#     (parallel queueing). When >1 entry, each gets its own subdir under $work_dir
#     (named '<idx>_<test-slug>'), so logs and outputs don't collide.
test_ids=(
    # "perf/test_perf_sanity.py::test_e2e[disagg-gen_only-b200_deepseek-r1-fp4_1k1k_con1_ctx1_dep4_gen1_tep8_eplb0_mtp3_ccb-NIXL]"
    # Add more entries here, e.g.:
    "perf/test_perf_sanity.py::test_e2e[disagg-e2e-h200_qwen3-32b-fp8_4k1k_con128_ctx1_tp1_gen1_tp2_eplb0_mtp0_ccb-DEFAULT]"
    "perf/test_perf_sanity.py::test_e2e[disagg-ctx_only-h200_qwen3-32b-fp8_4k1k_con128_ctx1_tp1_gen1_tp2_eplb0_mtp0_ccb-DEFAULT]"
)

# Install mode: 'wheel' (pip install <wheel-path>) or 'source' (pip install -e .)
install_mode="wheel"

# Local wheel file (required when install_mode=wheel).
# Kept under $trtllm/build so the single $trtllm mount above covers it.
#
# The filename MUST follow PEP 427 wheel naming convention:
#   {name}-{version}(+{local})-{python}-{abi}-{platform}.whl
# pip will reject the install if any field is malformed. Find the exact name
# with: ls $trtllm/build/tensorrt_llm-*.whl
wheel_path="$trtllm/build/tensorrt_llm-1.3.0rc16+ngcpytorch2602-cp312-cp312-linux_x86_64.whl"

# Optional flags — uncomment to enable
# build_wheel_flag="--build-wheel"
# capture_nsys_flag="--capture-nsys"

# Comma-separated list of #SBATCH options to strip from the generated
# slurm_launch.sh (because the local SLURM version / cluster doesn't accept them).
# Why these defaults:
#   --segment         : newer SLURM topology option, not in older versions.
#   --gres            : EOS doesn't register GPUs as gres at all.
#   --gpus-per-node   : SLURM translates this into a gres request internally,
#                       which also fails on EOS for the same reason.
# Set to "" to keep all; on clusters with a real GPU gres (B200/GB200 etc.),
# you typically want at most "--segment".
strip_sbatch_opts="--segment,--gres,--gpus-per-node"
