# SLURM Configuration
slurm:
  script_file: "disaggr_torch.slurm"
  partition: "gb200nvl72_preprod"
  account: "blackwell"
  job_time: "04:00:00"
  job_name: "coreai_comparch_trtllm"
  numa_bind: true # Only enable for GB200 NVL72
  timeout: 7200

# Hardware Configuration
hardware:
  gpus_per_node: 4
  gpus_per_server: 8

# Environment Configuration
environment:
  container_mount: "/home/chenfeiz/:/home/chenfeiz/,/home/chenfeiz/.cache:/root/.cache,/home/scratch.chenfeiz_gpu:/home/scratch.chenfeiz_gpu,/home/scratch.trt_llm_data:/home/scratch.trt_llm_data"
  container_image: "urm.nvidia.com#sw-tensorrt-docker/tensorrt-llm:pytorch-25.10-py3-aarch64-ubuntu24.04-trt10.13.3.9-skip-tritondevel-202511200955-9055"
  container_workdir: "/home/scratch.chenfeiz_gpu/another_repo/tekit-2"
  job_workspace: "/home/scratch.chenfeiz_gpu/another_repo/tekit-2/pytest_aggr_workspace-6"
  model_path: ""
  model_name: "deepseek_r1_0528_fp4_v2"
  llm_models_root: "/home/scratch.trt_llm_data/llm-models"
  trtllm_repo: "/home/scratch.chenfeiz_gpu/another_repo/tekit-2"
  build_wheel: false  # Don't build the wheel when launching multiple jobs
  trtllm_wheel_path: ""  # Path to pre-built TensorRT-LLM wheel. If provided, install from this wheel instead
  server_env_var: ""

# Server Configuration
server_configs:
  - name: "r1_fp4_v2_dep8_mtp1"
    model_name: "deepseek_r1_0528_fp4_v2"
    gpus: 8
    gpus_per_node: 4
    trust_remote_code: true
    tensor_parallel_size: 8
    moe_expert_parallel_size: 8
    pipeline_parallel_size: 1
    max_batch_size: 512
    max_num_tokens: 2112
    attn_backend: "TRTLLM"
    enable_attention_dp: true
    attention_dp_config:
      batching_wait_iters: 0
      enable_balance: true
      timeout_iters: 60
    moe_config:
      backend: 'CUTLASS'
    cuda_graph_config:
      enable_padding: true
      max_batch_size: 512
    kv_cache_config:
      dtype: 'fp8'
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.5
    client_configs:
      - name: "con32_iter12_1k1k"
        concurrency: 32
        iterations: 12
        isl: 1024
        osl: 1024
        random_range_ratio: 0.8
        backend: "openai"
